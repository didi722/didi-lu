async function caricaColoriPlayers() {
    try {
        const snapshot = await db.ref('players').once('value');
        const playersData = snapshot.val();
        
        if (!playersData) return;

        for (let nomeKey in playersData) {
            const nomeMinuscolo = nomeKey.toLowerCase();
            
            const coloreRecuperato = playersData[nomeKey].info?.color;
            
            if (coloreRecuperato) {
                playerColors[nomeMinuscolo] = coloreRecuperato;
            }
        }
        console.log("Colori mappati:", playerColors);
    } catch (error) {
        console.error("Errore caricamento:", error);
    }
}

// Funzione per scurire o schiarire un colore HEX
function pSBC(p, c0, c1, l) {
    let r, g, b, P, f, t, h, i = parseInt, m = Math.round, a = typeof (c1) == "string";
    if (typeof (p) != "number" || p < -1 || p > 1 || typeof (c0) != "string" || (c0[0] != 'r' && c0[0] != '#') || (c1 && !a)) return null;
    if (!this.pSBCr) this.pSBCr = (d) => {
        let n = d.length, x = {};
        if (n > 9) {
            [r, g, b, a] = d = d.split(","), n = d.length;
            if (n < 3 || n > 4) return null;
            x.r = i(r[3] == "a" ? r.slice(5) : r.slice(4)), x.g = i(g), x.b = i(b), x.a = a ? parseFloat(a) : -1
        } else {
            if (n == 8 || n == 6 || n < 4) return null;
            if (n < 6) d = "#" + d[1] + d[1] + d[2] + d[2] + d[3] + d[3] + (n > 4 ? d[4] + d[4] : "");
            d = i(d.slice(1), 16);
            if (n == 9 || n == 5) x.r = d >> 24 & 255, x.g = d >> 16 & 255, x.b = d >> 8 & 255, x.a = m((d & 255) / 0.255) / 1000;
            else x.r = d >> 16, x.g = d >> 8 & 255, x.b = d & 255, x.a = -1
        } return x
    };
    h = c0.length > 9, f = this.pSBCr(c0);
    if (!f) return null;
    if (p < 0) p *= -1, t = { r: 0, g: 0, b: 0, a: f.a };
    else t = { r: 255, g: 255, b: 255, a: f.a };
    r = m((t.r - f.r) * p) + f.r, g = m((t.g - f.g) * p) + f.g, b = m((t.b - f.b) * p) + f.b;
    return "#" + (0x1000000 + (f.a != -1 ? m(f.a * 255) : 0) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function getPlayerPalette(baseColor) {
    if (!baseColor) baseColor = "#31c489";
    
    return {
        base: baseColor,
        dark: pSBC(-0.4, baseColor),
        darker: pSBC(-0.7, baseColor),
        light: pSBC(0.6, baseColor),
        tag: pSBC(-0.5, baseColor),
        bright: pSBC(0.3, baseColor)
    };
}

}

async function recuperaStagioneCorrente() {
    // 1. Leggiamo l'ID dall'URL (es: matches.html?id=-O123456)
    const urlParams = new URLSearchParams(window.location.search);
    const idStagioneURL = urlParams.get('id');

    if (idStagioneURL) {
        stagioneAttiva = idStagioneURL;
    } else {
        // Fallback ai settings se non c'è ID nell'URL
        try {
            const snapSettings = await db.ref('settings/currentSeason').once('value');
            if (snapSettings.exists()) {
                stagioneAttiva = snapSettings.val();
            } else {
                stagioneAttiva = "sbeta"; // Fallback estremo se tutto fallisce
            }
        } catch (e) {
            console.error("Errore nel recupero settings:", e);
            stagioneAttiva = "sbeta";
        }
    }

    console.log("🔥 Stagione agganciata:", stagioneAttiva);

    // 2. Recupero il nome reale per la UI
    try {
        const snapInfo = await db.ref(`seasons/${stagioneAttiva}/info/name`).once('value');
        let nomeVisualizzato = stagioneAttiva; 

        if (snapInfo.exists()) {
            nomeVisualizzato = snapInfo.val();
        }

        // 3. Aggiornamento elementi visivi
        const titoloPagina = document.querySelector('h1');
        if (titoloPagina) {
            titoloPagina.innerText = nomeVisualizzato.toUpperCase();
            titoloPagina.className = "hub-title-display";
        }
        
        document.title = `Matches - ${nomeVisualizzato}`;

    } catch (error) {
        console.error("Errore nel recupero del nome stagione:", error);
    }
}


async function inizializzaPaginaArchivio() {
    const loader = document.getElementById('loading-screen');
    const container = document.getElementById('matchList');
    const topBar = document.querySelector('.top-bar');
    const adminPlusBtn = document.querySelector('.btn-floating-admin'); // Selettore per il tasto +
    
    // 1. Mostra loader
    if (loader) {
        loader.style.display = 'flex';
        loader.style.opacity = '1';
    }

    try {
        // --- 2. GESTIONE AUTENTICAZIONE E COLORE ---
        // Attendiamo che Firebase inizializzi l'utente
        const user = await new Promise((resolve) => {
            const unsubscribe = firebase.auth().onAuthStateChanged((u) => {
                unsubscribe();
                resolve(u);
            });
        });

        let userColor = "#FFA500"; // Default (Arancione)
        let isAdmin = false;

        if (user) {
            isAdmin = true; // Se c'è un utente, abilitiamo i permessi admin visivi
            
            // Recuperiamo il nome per ottenere il colore personalizzato
            const nameSnap = await db.ref(`users/${user.uid}/name`).once('value');
            const playerName = nameSnap.val();

            if (playerName) {
                const colorSnap = await db.ref(`players/${playerName.toLowerCase().trim()}/info/color`).once('value');
                if (colorSnap.exists()) {
                    userColor = colorSnap.val();
                }
            }
        }

        // --- 3. APPLICAZIONE VISIBILITÀ ADMIN ---
        // Mostra/Nascondi il tasto floating principale
        if (adminPlusBtn) {
            adminPlusBtn.style.display = isAdmin ? 'flex' : 'none';
        }

        // Colore della Top Bar
        if (topBar) {
            topBar.style.setProperty('background-color', userColor, 'important');
        }

        // --- 4. RECUPERO DATI STAGIONE ---
        if (typeof stagioneAttiva === 'undefined' || !stagioneAttiva) {
            await recuperaStagioneCorrente();
        }

        // Recupero dati in parallelo
        const [snapTeams, snapShowdowns, snapLeaderboard, snapPlayersAll] = await Promise.all([
            db.ref(`seasons/${stagioneAttiva}/teams_iscritti`).once('value'),
            db.ref(`seasons/${stagioneAttiva}/showdowns`).once('value'),
            db.ref(`seasons/${stagioneAttiva}/leaderboard`).once('value'),
            db.ref(`players`).once('value') 
        ]);

        const dataIscritti = snapTeams.val() || {};
        const dataShowdowns = snapShowdowns.val() || {};
        const dataLeaderboard = snapLeaderboard.val() || {};
        const dataPlayers = snapPlayersAll.val() || {};
        
        window.teamsIscrittiStagione = dataIscritti;

        if (!container) return;
        container.innerHTML = "";

        // --- 5. RENDERING SHOWDOWNS ---
        const sortedSdKeys = Object.keys(dataShowdowns).sort((a, b) => {
            const dataA = dataShowdowns[a].info?.data || "";
            const dataB = dataShowdowns[b].info?.data || "";
            return dataB.localeCompare(dataA);
        });

        if (sortedSdKeys.length === 0) {
            container.innerHTML = "<p style='color:white; text-align:center; padding:20px;'>Nessuno showdown trovato per questa stagione.</p>";
        }

        sortedSdKeys.forEach(sdId => {
            const sd = dataShowdowns[sdId];
            const info = sd.info || {};
            const matches = sd.matches || {};
            
            let vintiP1 = 0, vintiP2 = 0;
            Object.values(matches).forEach(m => {
                if (m.p1score > m.p2score) vintiP1++;
                else if (m.p2score > m.p1score) vintiP2++;
            });

            const nomeVincitore = info.vincitoreShowdown; 
            let winnerColor = "#000"; 
            if (nomeVincitore && dataPlayers[nomeVincitore]) {
                winnerColor = dataPlayers[nomeVincitore].info?.color || "#000";
            }

            const sdCard = document.createElement('div');
            sdCard.className = 'showdown-summary-card';
            sdCard.style.setProperty('--winner-color', winnerColor);
            
            sdCard.onclick = () => {
                if (typeof apriModaleShowdown === 'function') apriModaleShowdown(sdId, sd);
            };

            // Il blocco 'sd-admin-overlay' viene mostrato solo se isAdmin è true
            sdCard.innerHTML = `
                <div class="sd-card-header">
                    <span class="sd-badge-label">SHOWDOWN</span>
                    <span class="sd-category-tag">${info.categoria || "OU"}</span>
                </div>
                <div class="sd-card-content">
                    <div class="sd-player-display">
                        <span class="sd-name">${info.player1 || 'TBD'}</span>
                    </div>
                    <div class="sd-result-badge">
                        <span class="sd-final-score">${vintiP1} - ${vintiP2}</span>
                    </div>
                    <div class="sd-player-display">
                        <span class="sd-name">${info.player2 || 'TBD'}</span>
                    </div>
                </div>
                <div class="sd-card-footer">
                    <span class="sd-date-text">${info.data ? info.data : 'No date'}</span>
                    
                    <div class="sd-admin-overlay" style="display: ${isAdmin ? 'flex' : 'none'}">
                        <button class="btn-sd-icon edit" onclick="event.stopPropagation(); if(window.apriCreazioneShowdown) apriCreazioneShowdown('${sdId}')">✏️</button>
                        <button class="btn-sd-icon delete" onclick="event.stopPropagation(); if(window.eliminaShowdown) eliminaShowdown('${sdId}')">🗑️</button>
                    </div>
                    
                    <span class="sd-view-action">➜</span>
                </div>
            `;
            container.appendChild(sdCard);
        });

        // --- 6. RENDER RANKINGS ---
        if (typeof renderRankings === 'function') {
            await renderRankings(dataLeaderboard);
        }

    } catch (e) {
        console.error("❌ Errore critico Archivio:", e);
    } finally {
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }
    }
}

// --- 1. APERTURA PANNELLO (NUOVO O MODIFICA) ---
async function apriCreazioneShowdown(showdownId = null) {
    chiudiPannelli();
    
    // 1. Riferimenti agli elementi
    const configPanel = document.getElementById('admin-create-showdown-panel');
    const dashboardPanel = document.getElementById('admin-showdown-dashboard');
    const panelTitle = document.getElementById('sd-panel-title');
    const submitBtn = document.getElementById('sd-submit-btn');
    const hiddenIdField = document.getElementById('edit-showdown-id-hidden');
    const globalIdField = document.getElementById('current-showdown-id');

    if (!configPanel || !dashboardPanel) return;

    // 2. RESET TOTALE DEI RIFERIMENTI (Fondamentale per evitare l'effetto memoria)
    if (hiddenIdField) hiddenIdField.value = ""; 
    if (globalIdField) globalIdField.value = "";
    
    // Reset campi input
    document.getElementById('sd-player1').value = "";
    document.getElementById('sd-player2').value = "";
    document.getElementById('sd-date').value = new Date().toISOString().split('T')[0];

    // 3. Gestione Pannelli UI
    configPanel.style.display = 'block';
    dashboardPanel.style.display = 'none';

    const stagione = (typeof stagioneAttiva !== 'undefined' && stagioneAttiva) ? stagioneAttiva : 'sbeta';

    // 4. Caricamento liste giocatori/categorie
    await popolaSelectShowdown(); 

    if (showdownId) {
        // --- MODALITÀ EDIT (Showdown Esistente) ---
        if (hiddenIdField) hiddenIdField.value = showdownId;
        if (globalIdField) globalIdField.value = showdownId; // Lo settiamo subito anche qui
        
        if (panelTitle) panelTitle.innerText = "Edit Showdown";
        if (submitBtn) submitBtn.innerText = "See Matches";

        try {
            const snap = await db.ref(`seasons/${stagione}/showdowns/${showdownId}`).once('value');
            const sd = snap.val();

            if (sd && sd.info) {
                document.getElementById('sd-player1').value = sd.info.player1 || "";
                document.getElementById('sd-player2').value = sd.info.player2 || "";
                document.getElementById('sd-cat').value = sd.info.categoria || "";
                document.getElementById('sd-date').value = sd.info.data || "";
            }
        } catch (error) {
            console.error("Errore nel recupero dati showdown:", error);
        }
    } else {
        // --- MODALITÀ NEW (Nuovo Showdown) ---
        // I campi sono già stati resettati al punto 2
        if (panelTitle) panelTitle.innerText = "New Showdown";
        if (submitBtn) submitBtn.innerText = "Create & Open";
        
        // Assicuriamoci che la dashboard dei match sia "vergine"
        if (typeof resetSlotDashboard === "function") {
            resetSlotDashboard();
        }
    }
}

// --- 3. ELIMINAZIONE SHOWDOWN ---
async function eliminaShowdown(sdId) {
    if (!confirm(`Sei sicuro di voler eliminare l'intero Showdown ${sdId}? Questa azione è irreversibile.`)) return;

    try {
        const stagione = (typeof stagioneAttiva !== 'undefined' && stagioneAttiva) ? stagioneAttiva : 'sbeta';
        
        // 1. Recuperiamo i dati dello showdown PRIMA di eliminarlo
        // Ci servono gli ID dei player per ricalcolare le loro statistiche globali dopo
        const snap = await db.ref(`seasons/${stagione}/showdowns/${sdId}`).once('value');
        const sd = snap.val();

        if (!sd) {
            alert("Showdown non trovato.");
            return;
        }

        // 2. Eliminazione fisica dello Showdown
        // Questo elimina in un colpo solo info, impostazioni e tutti i match (match1, match2, ecc.)
        await db.ref(`seasons/${stagione}/showdowns/${sdId}`).remove();

        console.log(`Showdown ${sdId} rimosso. Avvio ricalcolo statistiche...`);

        // 3. Ricalcolo Leaderboard e Statistiche Globali
        // Usiamo i dati salvati in sd.info per identificare i player coinvolti
        if (sd.info) {
            const p1Id = sd.info.player1?.toLowerCase();
            const p2Id = sd.info.player2?.toLowerCase();

            // Aggiorniamo la leaderboard stagionale (che ora ignorerà lo showdown rimosso)
            if (typeof aggiornaLeaderboard === "function") {
                await aggiornaLeaderboard(stagione);
            }

            // Aggiorniamo le statistiche globali dei due player
            if (typeof ricalcolaStatisticheGlobali === "function") {
                if (p1Id) await ricalcolaStatisticheGlobali(p1Id);
                if (p2Id) await ricalcolaStatisticheGlobali(p2Id);
            }
        }

        alert("Showdown eliminato e statistiche sincronizzate correttamente.");
        
        // 4. Refresh della pagina o della grafica
        if (typeof inizializzaPaginaArchivio === "function") {
            inizializzaPaginaArchivio();
        } else {
            location.reload();
        }

    } catch (e) {
        console.error("Errore durante l'eliminazione dello showdown:", e);
        alert("Errore tecnico: " + e.message);
    }
}

async function popolaSelectShowdown() {

        const stagione = (typeof stagioneAttiva !== 'undefined' && stagioneAttiva) ? stagioneAttiva : 'sbeta';
        const snap = await db.ref(`seasons/${stagione}`).once('value');
        const data = snap.val();

        if (!data) {

            return;

        // 1. Popolamento Formati (Categoria)

}

/**
 * 1. APERTURA MODALE MATCH
 */
async function apriModaleMatch(num) {
    console.log("Apertura Modale Match #" + num);

    // 1. Recupero ID Showdown e Stagione
    const sdId = document.getElementById('current-showdown-id')?.value;
    const stagione = (typeof stagioneAttiva !== 'undefined' && stagioneAttiva) ? stagioneAttiva : 'sbeta';
    
    if (!sdId) {
        alert("Errore: ID Showdown mancante!");
        return console.error("ID Showdown mancante!");
    }

    const panel = document.getElementById('admin-matches-panel');
    if (!panel) return console.error("Pannello admin-matches-panel non trovato nel DOM!");

    const modalTitle = document.getElementById('match-panel-title'); 
    const saveBtn = document.getElementById('btn-save-match-main');
    const globalKeyInput = document.getElementById('match-global-key');

    // Salva il numero del match nel dataset per il salvataggio
    panel.dataset.currentMatchNum = num;

    // Reset completo dell'interfaccia prima di caricare i nuovi dati
    if (typeof resetStatoModaleMatch === "function") {
        resetStatoModaleMatch();
    } else {
        // Fallback manuale se resetStatoModaleMatch non fosse disponibile
        document.querySelectorAll('#replays-inputs-list input[type="text"]').forEach(i => i.value = "");
    }
    
    // Reset della chiave globale (fondamentale per distinguere ADD da EDIT)
    if (globalKeyInput) globalKeyInput.value = "";

    try {
        // ==========================================================
        // STEP 1: Recupero dati FISSI dello Showdown (Info Generali)
        // ==========================================================
        const infoPath = `seasons/${stagione}/showdowns/${sdId}/info`;
        const infoSnap = await db.ref(infoPath).once('value');
        const infoData = infoSnap.val() || {};

        const p1Raw = infoData.player1 || "";
        const p2Raw = infoData.player2 || "";
        const dataSD = infoData.data || "";
        const cat = infoData.categoria || "";

        // Compiliamo e blocchiamo i campi ereditati dallo showdown
        const sDate = document.getElementById('match-date');
        const sCat = document.getElementById('match-cat');
        const sP1 = document.getElementById('match-player1');
        const sP2 = document.getElementById('match-player2');

        if (sDate) { sDate.value = dataSD; sDate.readOnly = true; }
        if (sCat) { sCat.innerHTML = `<option value="${cat}">${cat}</option>`; sCat.disabled = true; }
        if (sP1) { sP1.innerHTML = `<option value="${p1Raw}">${p1Raw}</option>`; sP1.disabled = true; }
        if (sP2) { sP2.innerHTML = `<option value="${p2Raw}">${p2Raw}</option>`; sP2.disabled = true; }

        // ==========================================================
        // STEP 2: Popolamento menu a tendina dei Team (Asincrono)
        // ==========================================================
        await popolaSelectTeamSpecificoPerPlayer(p1Raw, p2Raw, cat);

        // ==========================================================
        // STEP 3: Recupero dati specifici del MATCH (Editing)
        // ==========================================================
        const matchPath = `seasons/${stagione}/showdowns/${sdId}/matches/match${num}`;
        const matchSnap = await db.ref(matchPath).once('value');
        const mData = matchSnap.val();

        if (mData) {
            // ---> MODALITÀ EDIT <---
            if (modalTitle) modalTitle.innerText = `EDIT MATCH #${num}`;
            if (saveBtn) saveBtn.innerText = "Update Match";
            if (globalKeyInput) globalKeyInput.value = mData.globalKey || "";

            // Score
            const scoreSelect = document.getElementById('match-score');
            if (scoreSelect && mData.score) scoreSelect.value = mData.score;

            // Teams
            const t1 = document.getElementById('match-team1');
            const t2 = document.getElementById('match-team2');
            if (t1 && mData.team1) t1.value = mData.team1;
            if (t2 && mData.team2) t2.value = mData.team2;

            // Replays e Vincitori Set
            if (mData.replays) {
                for (let i = 1; i <= 5; i++) {
                    const setData = mData.replays[`set${i}`];
                    if (setData) {
                        const inputUrl = document.getElementById(`replay-s${i}`);
                        if (inputUrl) inputUrl.value = setData.url || "";
                        
                        if (setData.vincitore && typeof selectWinner === "function") {
                            let uiWinner = setData.vincitore;
                            if (setData.vincitore === "1") uiWinner = 'D'; 
                            if (setData.vincitore === "2") uiWinner = 'L'; 
                            selectWinner(i, uiWinner, false);
                        }
                    }
                }
            }
        } else {
            // ---> MODALITÀ ADD <---
            if (modalTitle) modalTitle.innerText = "ADD A NEW MATCH";
            if (saveBtn) saveBtn.innerText = "Add Match";
        }

    } catch (error) {
        console.error("Errore nel caricamento del modale:", error);
        alert("Errore nel caricamento dati. Controlla la console.");
    }

    // Mostra il pannello e aggiorna le iniziali sui bottoni vincitore
    panel.style.display = 'block';
    if (typeof aggiornaEtichetteBottoni === "function") aggiornaEtichetteBottoni(false);
}

function capitalizzaNome(stringa) {
    if (!stringa) return "";
    return stringa.charAt(0).toUpperCase() + stringa.slice(1).toLowerCase();
}

async function popolaSelectTeamSpecificoPerPlayer(p1, p2, formato) {
    // 1. Identifichiamo il pannello corretto per evitare conflitti di ID duplicati
    const panel = document.getElementById('admin-matches-panel');
    if (!panel) return console.error("Pannello admin-matches-panel non trovato!");

    // 2. Cerchiamo gli elementi all'interno di QUESTO specifico pannello
    const t1Select = panel.querySelector('#match-team1');
    const t2Select = panel.querySelector('#match-team2');
    const scoreSelect = panel.querySelector('#match-score');

    if (!t1Select || !t2Select || !scoreSelect) {
        console.error("ERRORE: Select non trovate dentro admin-matches-panel!");
        return;
    }

    t1Select.innerHTML = '<option value="">Loading teams...</option>';
    t2Select.innerHTML = '<option value="">Loading teams...</option>';

    try {
        const stagione = (typeof stagioneAttiva !== 'undefined' && stagioneAttiva) ? stagioneAttiva : 'sbeta';
        
        if (typeof db === 'undefined') throw new Error("Firebase 'db' non definito");

        const snap = await db.ref(`seasons/${stagione}`).once('value');
        const data = snap.val();

        if (!data) throw new Error("Dati stagione mancanti");

        // --- POPOLAMENTO SCORE ---
        const bestOf = (data.info && data.info.best_of) ? parseInt(data.info.best_of) : 5;
        let opzioniScore = (bestOf === 3) 
            ? ["2-0", "2-1", "1-2", "0-2"] 
            : ["5-0", "4-1", "3-2", "2-3", "1-4", "0-5"];
        
        scoreSelect.innerHTML = '<option value="">Select Score</option>' + 
            opzioniScore.map(o => `<option value="${o}">${o}</option>`).join('');

        // --- POPOLAMENTO TEAM ---
        window.teamsIscrittiStagione = data.teams_iscritti;
        
        // Usiamo la funzione helper che hai già per generare le options
        t1Select.innerHTML = generaHtmlOptionsTeams(data, formato, p1);
        t2Select.innerHTML = generaHtmlOptionsTeams(data, formato, p2);

        console.log("✅ Popolamento mirato completato con successo");

    } catch (e) {
        console.error("🔥 Errore nel popolamento:", e.message);
        t1Select.innerHTML = '<option value="">Error</option>';
        t2Select.innerHTML = '<option value="">Error</option>';
    }
}

function generaHtmlOptionsTeams(data, formato, player) {
    // 1. Normalizzazione Player ID (es. "Didi")
    const idDB = player ? player.toLowerCase().trim() : "";
    
    // 2. Accesso ai nodi secondo la tua struttura
    // seasons -> teams_iscritti -> NOME_FORMATO -> NOME_PLAYER
    const teamsIscritti = data.teams_iscritti || {};
    const formatoNode = teamsIscritti[formato]; 
    const playerNode = formatoNode ? formatoNode[idDB] : null;
    const datiTeams = playerNode ? playerNode.datiTeams : null;

    console.log(`🔍 Cerco team per: ${idDB} in formato: ${formato}`);

    let html = '<option value="">Select Team</option>';
    
    if (datiTeams) {
        // Trasformiamo in array (gestisce sia [{}, {}] che {0: {}, 1: {}})
        const teamList = Array.isArray(datiTeams) ? datiTeams : Object.values(datiTeams);
        let count = 0;
        
        teamList.forEach(t => {
            // Accediamo a datiTeams / indice / nome
            // Supporta sia t.nome semplice che t.nome.valore
            let nomeT = "";
            if (t && t.nome) {
                nomeT = (typeof t.nome === 'object') ? t.nome.valore : t.nome;
            }

            if (nomeT) {
                html += `<option value="${nomeT}">${nomeT}</option>`;
                count++;
            }
        });

        if (count === 0) {
            console.warn(`⚠️ Nessun "nome" trovato dentro datiTeams per ${idDB}`);
            html = '<option value="">No named teams</option>';
        }
    } else {
        console.error(`❌ Percorso DB mancante: teams_iscritti / ${formato} / ${idDB} / datiTeams`);
        html = '<option value="">No teams found</option>';
    }
    return html;
}

/**
 * 5. GENERAZIONE GIF UNIVERSALE
 * Cerca le immagini dei pokemon in base al nome del team scelto
 */
function generaHtmlGifs(nomeTeam, categoria) {
    if (!window.teamsIscrittiStagione || !categoria || !window.teamsIscrittiStagione[categoria]) return "";
    
    const nodiPlayer = window.teamsIscrittiStagione[categoria];
    let teamTrovato = null;

    // Cerca il team tra tutti i giocatori della categoria
    for (const pKey in nodiPlayer) {
        const listaTeams = nodiPlayer[pKey].datiTeams;
        if (listaTeams) {
            const teamArray = Array.isArray(listaTeams) ? listaTeams : Object.values(listaTeams);
            teamTrovato = teamArray.find(t => {
                const n = (typeof t.nome === 'object') ? t.nome.valore : t.nome;
                return n === nomeTeam;
            });
        }
        if (teamTrovato) break;
    }

    if (!teamTrovato || !teamTrovato.pokemon) return "";

    return Object.values(teamTrovato.pokemon).map(p => {
        if (!p || !p.nome || p.nome === "None") return "";
        const slug = p.nome.toLowerCase().replace(/\s+/g, '').replace(/[.'é’%]/g, '');
        return `<img src="https://play.pokemonshowdown.com/sprites/ani/${slug}.gif" class="mini-gif" onerror="this.src='https://play.pokemonshowdown.com/sprites/dex/${slug}.png';">`;
    }).join('');
}

function formattaDataItaliana(dataStr) {
    if (!dataStr) return "";
    // Se la data è nel formato AAAA-MM-GG
    const parti = dataStr.split('-');
    if (parti.length === 3) {
        return `${parti[2]}/${parti[1]}/${parti[0]}`;
    }
    return dataStr; // Fallback se è già formattata
}


async function apriDettaglioTeam(idPlayerPuro, nomeTeam, formato) {
    const modal = document.getElementById('teamModal');
    const content = document.getElementById('teamDetailContent');
    
    // 1. Mostriamo il caricamento
    content.innerHTML = '<div style="color:white; text-align:center; padding:20px;">Caricamento dati team...</div>';
    modal.style.display = 'flex';

    try {
        // --- LOGICA PALETTE DINAMICA ---
        // Recuperiamo il colore del player dal database
        const colorSnap = await db.ref(`players/${idPlayerPuro.toLowerCase()}/info/color`).once('value');
        const baseColor = colorSnap.val() || "#31c489"; // Verde di default se manca
        const palette = getPlayerPalette(baseColor); 
        // -------------------------------

        const dataIscritti = window.teamsIscrittiStagione; 
        if (!dataIscritti || !dataIscritti[formato]) {
            content.innerHTML = `<div style="color:white; text-align:center;">Formato "${formato}" non trovato.</div>`;
            return;
        }

        const formatoData = dataIscritti[formato];
        let teamData = null;
        let proprietarioEffettivo = idPlayerPuro;

        // 2. RICERCA AGNOSTICA
        for (const playerKey in formatoData) {
            const playerNode = formatoData[playerKey];
            if (playerNode && playerNode.datiTeams) {
                const trovato = Object.values(playerNode.datiTeams).find(t => {
                    const n = (typeof t.nome === 'object') ? t.nome.valore : t.nome;
                    return n && n.trim().toLowerCase() === nomeTeam.trim().toLowerCase();
                });

                if (trovato) {
                    teamData = trovato;
                    proprietarioEffettivo = playerKey;
                    break;
                }
            }
        }

        if (teamData) {
            // Sincronizzazione statistiche
            const statsCalcolate = (window.databaseDidi && window.databaseDidi[nomeTeam]) || 
                                   (window.databaseLu && window.databaseLu[nomeTeam]) || {};

            let team = {
                nome: (typeof teamData.nome === 'object') ? teamData.nome.valore : teamData.nome,
                vittorie: statsCalcolate.vittorie || 0,
                sconfitte: statsCalcolate.sconfitte || 0,
                setVinti: statsCalcolate.setVinti || 0,
                setPersi: statsCalcolate.setPersi || 0,
                puntiFatti: statsCalcolate.puntiFatti || 0,
                pokemon: []
            };

            if (teamData.pokemon) {
                const listaPkm = Array.isArray(teamData.pokemon) ? teamData.pokemon : Object.values(teamData.pokemon);
                team.pokemon = listaPkm.map(p => ({
                    nome: p.nome || "???",
                    abilita: p.abilita || "N/D",
                    strumento: p.strumento || "Nessuno",
                    mosse: p.mosse ? (Array.isArray(p.mosse) ? p.mosse : Object.values(p.mosse)) : ["-", "-", "-", "-"],
                    evs: p.evs || "N/D"
                }));
            }

            // 3. GENERAZIONE HTML: Passiamo la palette calcolata
            content.innerHTML = generaHtmlDettaglioTeam(team, proprietarioEffettivo, palette);
            
        } else {
            content.innerHTML = `<div style="color:white; text-align:center;">Team "${nomeTeam}" non trovato nel formato ${formato}.</div>`;
        }
    } catch (e) {
        console.error("Errore dettaglio team:", e);
        content.innerHTML = `<div style="color:white; text-align:center;">Errore durante il caricamento.</div>`;
    }
}

window.caricaVideoDirect = function(urlFile, btnElement) {
    console.log("Tentativo caricamento Replay. Link ricevuto:", urlFile);

    // 1. Gestione estetica dei bottoni (Highlight del set selezionato)
    document.querySelectorAll('.btn-set').forEach(b => b.classList.remove('active'));
    if (btnElement) {
        btnElement.classList.add('active');
    }

    // 2. Identificazione dell'iframe
    // Cerchiamo 'replayFrame' (usato nel modal replay) o 'videoFrame' (usato in altre parti)
    const iframe = document.getElementById('replayFrame') || document.getElementById('videoFrame');
    
    if (!iframe) {
        console.error("ERRORE: Nessun iframe trovato con ID 'replayFrame' o 'videoFrame'");
        return;
    }

    // 3. Logica di caricamento URL
    if (urlFile && (urlFile.startsWith('http') || urlFile.startsWith('https'))) {
        // Caso A: Link diretto da Firebase Cloud Storage
        console.log("Caricamento da Cloud Storage (Firebase)...");
        iframe.src = urlFile;
    } 
    else if (urlFile && urlFile.trim() !== "") {
        // Caso B: Retrocompatibilità con file locali (cartella video/ o replays/)
        let nomeFile = urlFile.trim();
        
        // Assicuriamoci che abbia l'estensione .html
        if (!nomeFile.toLowerCase().endsWith('.html')) {
            nomeFile += '.html';
        }

        // Se il nome file non ha già il prefisso della cartella, lo aggiungiamo
        // Nota: i tuoi file locali sono solitamente in 'video/' o 'replays/'
        let pathFinale;
        if (nomeFile.startsWith('video/') || nomeFile.startsWith('replays/')) {
            pathFinale = nomeFile;
        } else {
            pathFinale = `video/${nomeFile}`; // Default su cartella video
        }
        
        console.log("Caricamento legacy locale. Percorso generato:", pathFinale);
        iframe.src = pathFinale;
    } 
    else {
        // Caso C: URL vuoto o non valido
        console.warn("Nessun URL valido fornito. Pulizia iframe.");
        iframe.src = "about:blank";
    }
};

window.chiudiReplay = function() {
    const modal = document.getElementById('replayModal');
    const iframe = document.getElementById('replayFrame');
    const player = document.getElementById('bg-music-home') || document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-control');

    // 1. Chiudiamo il modal visivamente
    if (modal) {
        modal.style.display = "none";
    }

    // 2. Resettiamo l'iframe per fermare l'audio del video
    if (iframe) {
        iframe.src = ""; 
    }

    // 3. GESTIONE RIPRESA MUSICA (rispettando il Mute)
    if (player) {
        // Recuperiamo la preferenza globale
        const savedPref = localStorage.getItem('userMusicPref');

        if (savedPref === 'off') {
            // Se l'utente aveva spento la musica, assicuriamoci che resti in pausa
            player.pause();
            player.muted = true; // Sicurezza extra per evitare glitch audio
            if (musicBtn) musicBtn.classList.add('muted');
            console.log("🔇 Replay chiuso: la musica resta muta come da preferenza.");
        } else {
            // Se la musica era attiva (o non c'è preferenza), riprendiamo
            player.muted = false;
            player.play()
                .then(() => { 
                    if (musicBtn) musicBtn.classList.remove('muted');
                    console.log("🔊 Replay chiuso: musica home ripresa."); 
                })
                .catch(e => { 
                    console.log("Riproduzione bloccata dal browser: ", e); 
                    if (musicBtn) musicBtn.classList.add('muted');
                });
        }
    }
};

async function apriMatch(showdownID, matchKey, teamDidi, teamLu, scoreDidi, scoreLu) {
    const player = document.getElementById('bg-music-home') || document.getElementById('bg-music');
    
    // Invece di farla ripartire o resettare tutto, 
    // ci assicuriamo solo che sia ferma mentre guardi il replay.
    if (player) {
        player.pause();
    }

    const modal = document.getElementById('replayModal');
    const selector = document.getElementById('setSelector');
    
    // Rimuoviamo il vecchio header subito
    const vecchiaHeader = document.querySelector('.replay-mini-header');
    if (vecchiaHeader) vecchiaHeader.remove();

    selector.innerHTML = '<span style="color: white;">Caricamento replay...</span>';
    modal.style.display = 'flex';
    
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const stagioneUrl = urlParams.get('id')?.split(':')[0]; 
        const stagione = stagioneUrl || (typeof stagioneAttiva !== 'undefined' ? stagioneAttiva : 'sbeta');

        const path = `seasons/${stagione}/showdowns/${showdownID}`;
        const sdSnap = await db.ref(path).once('value');
        const sdData = sdSnap.val();

        if (!sdData) throw new Error("Dati showdown non trovati");

        // --- 1. RECUPERO COLORI ---
        const colors = await getPlayersColors(sdData.info.player1, sdData.info.player2);
        const c1 = colors.c1 || "#555";
        const c2 = colors.c2 || "#555";

        // Determiniamo il colore dell'header (ad esempio basato sul vincitore del match o neutro)
        // Se scoreDidi > scoreLu usa c1, altrimenti c2
        const vincitoreMatch = parseInt(scoreDidi) >= parseInt(scoreLu) ? c1 : c2;
        const bordoHeader = (typeof pSBC !== 'undefined') ? pSBC(-0.6, vincitoreMatch) : "#000";

        // --- 2. CREAZIONE DINAMICA HEADER (Ora che abbiamo i colori) ---
        const miniHeader = document.createElement('div');
        miniHeader.className = "replay-mini-header";
        miniHeader.style.fontFamily = "'Josefin Sans', sans-serif";
        miniHeader.style.backgroundColor = vincitoreMatch;
        miniHeader.style.border = `3px solid ${bordoHeader}`;
        miniHeader.style.boxShadow = `8px 8px 0px black`;
        miniHeader.style.display = "flex"; // Assicura l'allineamento
        miniHeader.style.alignItems = "center";
        miniHeader.style.justifyContent = "space-between";
        miniHeader.style.padding = "10px 20px";
        miniHeader.style.marginBottom = "15px";

        miniHeader.innerHTML = `
            <div class="mini-team-info side-didi">
                <div id="header-gifs-didi" class="mini-gifs-row"></div>
                <span class="mini-name" style="color: white; font-weight: 800;">${teamDidi}</span>
            </div>
            <div class="mini-score-box" style="color: black; background: white; padding: 2px 8px; font-weight: bold;">
                ${scoreDidi} - ${scoreLu}
            </div>
            <div class="mini-team-info side-lu" style="text-align: right;">
                <span class="mini-name" style="color: white; font-weight: 800;">${teamLu}</span>
                <div id="header-gifs-lu" class="mini-gifs-row"></div>
            </div>
        `;
        // Inseriamo l'header all'inizio della modale
        modal.prepend(miniHeader);

        // --- 3. RESTO DELLA LOGICA (Bottoni Replay) ---
        const categoriaMatch = sdData.info.categoria;
        const p1Name = sdData.info.player1 || "P1";
        const p2Name = sdData.info.player2 || "P2";
        
        let label1 = p1Name.charAt(0).toUpperCase();
        let label2 = p2Name.charAt(0).toUpperCase();
        if (label1 === label2) {
            let i = 1;
            while (p1Name.substring(0, i).toLowerCase() === p2Name.substring(0, i).toLowerCase() && i < p1Name.length) i++;
            label1 = p1Name.substring(0, i).toUpperCase();
            label2 = p2Name.substring(0, i).toUpperCase();
        }

        const matchObj = sdData.matches ? sdData.matches[matchKey] : null;

        if (matchObj && matchObj.replays) {
            let buttonsHtml = '';
            const setKeys = Object.keys(matchObj.replays).sort((a, b) => 
                (parseInt(a.replace(/\D/g, '')) || 0) - (parseInt(b.replace(/\D/g, '')) || 0)
            );

            setKeys.forEach(key => {
                const infoSet = matchObj.replays[key];
                const vincId = String(infoSet.vincitore); 
                const winInitial = (vincId === "1") ? label1 : (vincId === "2" ? label2 : "?");
                const colorSfondo = (vincId === "1") ? c1 : (vincId === "2" ? c2 : "#555");
                const colorBordo = (typeof pSBC !== 'undefined') ? pSBC(-0.6, colorSfondo) : "#000";

                if (infoSet.url) {
                    buttonsHtml += `
                        <button class="btn-set vincitore-${vincId}" 
                                style="background-color: ${colorSfondo}; border: 3px solid ${colorBordo}; color: white; font-weight: bold; cursor: pointer; box-shadow: 5px 5px 0px ${colorBordo}; transition: all 0.2s ease; margin: 0 5px; transform: rotate(-1deg);"
                                onclick="window.caricaVideoDirect('${infoSet.url}', this)">
                            ${winInitial}
                        </button>`;
                }
            });
            selector.innerHTML = buttonsHtml;
            setTimeout(() => { const firstBtn = selector.querySelector('.btn-set'); if (firstBtn) firstBtn.click(); }, 200);
        } else {
            selector.innerHTML = '<span style="color: white;">Replay non disponibili.</span>';
        }

        renderGifs(teamDidi, 'header-gifs-didi', categoriaMatch);
        renderGifs(teamLu, 'header-gifs-lu', categoriaMatch);

    } catch (error) {
        console.error("Errore apriMatch:", error);
        selector.innerHTML = `<span style="color: #ff4444;">Errore: ${error.message}</span>`;
    }
}

function renderGifs(nomeTeam, containerId, categoria) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = "";

    const dataIscritti = window.teamsIscrittiStagione; // seasons/ID/teams_iscritti
    if (!dataIscritti || !categoria) return;

    // Puntiamo al formato corretto (es: OU)
    const formatoData = dataIscritti[categoria]; 
    if (!formatoData) return;

    let teamTrovato = null;

    // Iteriamo sui Player di quel formato
    Object.values(formatoData).forEach(playerData => {
        //PlayerData è l'oggetto del player che contiene "datiTeams"
        const teamsDelPlayer = playerData.datiTeams || {};
        
        // Cerchiamo il team specifico per nome dentro datiTeams
        const match = Object.values(teamsDelPlayer).find(t => 
            t.nome && t.nome.trim().toLowerCase() === nomeTeam.trim().toLowerCase()
        );
        
        if (match) teamTrovato = match;
    });

    if (teamTrovato && teamTrovato.pokemon) {
        const pkmList = Array.isArray(teamTrovato.pokemon) ? teamTrovato.pokemon : Object.values(teamTrovato.pokemon);
        pkmList.forEach(p => {
            if (p.nome) {
                const img = document.createElement('img');
                img.src = typeof getGifUrl === "function" ? getGifUrl(p.nome) : `immagini/pokemon/${p.nome.toLowerCase()}.gif`;
                img.className = 'header-gif';
                container.appendChild(img);
            }
        });
    }
}

// Nuova funzione per scaricare i tipi
// Aggiunto "direzione" ai parametri
async function caricaTipi(pkmName, elementId, direzione) {
    try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${pkmName}`);
        const data = await res.json();
        const container = document.getElementById(elementId);
        if (!container) return;

        const d_types = ["normal","fire","water","electric","grass","ice","fighting","poison","ground","flying","psychic","bug","rock","ghost","dragon","dark","steel","fairy"];
        let effectiveness = {};
        d_types.forEach(type => effectiveness[type] = 1);

        await Promise.all(data.types.map(async (t) => {
            const typeRes = await fetch(t.type.url);
            const typeData = await typeRes.json();
            const rel = typeData.damage_relations;

            rel.double_damage_from.forEach(type => effectiveness[type.name] *= 2);
            rel.half_damage_from.forEach(type => effectiveness[type.name] *= 0.5);
            rel.no_damage_from.forEach(type => effectiveness[type.name] *= 0);
        }));

        let result = { x4: [], x2: [], x05: [], x025: [], x0: [] };
        for (let type in effectiveness) {
            const mult = effectiveness[type];
            if (mult === 4) result.x4.push(type);
            else if (mult === 2) result.x2.push(type);
            else if (mult === 0.5) result.x05.push(type);
            else if (mult === 0.25) result.x025.push(type);
            else if (mult === 0) result.x0.push(type);
        }

        const creaBadge = (lista) => {
            return `<div class="eff-badge-container">
                ${lista.map(t => `<span class="mini-type-badge ${t}">${t}</span>`).join('')}
            </div>`;
        };

        let tooltipHTML = "";
        if (result.x4.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-4">4x</span>${creaBadge(result.x4)}</div>`;
        if (result.x2.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-2">2x</span>${creaBadge(result.x2)}</div>`;
        if (result.x05.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-05">0.5x</span>${creaBadge(result.x05)}</div>`;
        if (result.x025.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-025">0.25x</span>${creaBadge(result.x025)}</div>`;
        if (result.x0.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-0">0x</span>${creaBadge(result.x0)}</div>`;

        // --- APPLICAZIONE CLASSE DIREZIONE ---
        container.innerHTML = data.types.map(t => 
        `<div class="type-container">
            <span class="type-badge ${t.type.name}">${t.type.name.toUpperCase()}</span>
            <div class="type-effectiveness-tooltip ${direzione}">${tooltipHTML}</div>
        </div>`
    ).join('');

    } catch (e) { console.error("Error:", e); }
}

function getGifUrl(pName) {

}

async function aggiornaGraficaShowdown() {

        const sd = snap.val();
        
        
        // Se non c'è lo showdown o non ci sono match, resettiamo tutti gli slot a "empty"
        const matches = (sd && sd.matches) ? sd.matches : {};

        // Cicliamo sui 3 match (BO3 standard degli Showdown)
        [1, 2, 3].forEach(num => {
            const mKey = `match${num}`;
            const matchData = matches[mKey];
            
            const statusIndicator = document.getElementById(`status-${num}`);
            const btnAdd = document.getElementById(`btn-add-${num}`);
            const detailsDiv = document.getElementById(`details-${num}`);

            if (matchData) {
                // --- IL MATCH ESISTE: Stato Completato ---
                statusIndicator.classList.remove('empty');
                statusIndicator.classList.add('completed');
                statusIndicator.innerText = `Match ${num} OK`;

                if (btnAdd) btnAdd.style.display = 'none';
                
                if (detailsDiv) {
                    detailsDiv.style.display = 'flex';
                    detailsDiv.innerHTML = `
                        <div class="preview-info">
                            <span class="p-score" style="font-weight: bold;">
                                ${matchData.p1score} - ${matchData.p2score}
                            </span>
                            <span class="p-replay">${matchData.replays ? '📹' : ''}</span>
                        </div>
                        <button class="btn-edit-mini" onclick="apriModaleMatch(${num})" title="Modifica Match">
                            ✏️
                        </button>
                    `;
                }
            } else {
                // --- IL MATCH NON ESISTE: Stato Vuoto ---
                statusIndicator.classList.add('empty');
                statusIndicator.classList.remove('completed');
                statusIndicator.innerText = `Match ${num}`;
                
                if (btnAdd) {
                    btnAdd.style.display = 'block';
                    // Assicuriamoci che anche il tasto + apra la modale corretta
                    btnAdd.onclick = () => apriModaleMatch(num);
                }
                if (detailsDiv) {
                    detailsDiv.style.display = 'none';
                    detailsDiv.innerHTML = '';
                }
            }
        });
    } catch (e) {
        console.error("Errore aggiornamento grafica showdown:", e);
    }
}

// Variabile globale per tracciare i vincitori dei set (sia in inserimento che modifica)
let vincitoriSelezionati = {};

// --- 1. SALVATAGGIO NUOVO MATCH ---
async function salvaMatchFirebase() {
    const panel = document.getElementById('admin-matches-panel');
    if (!panel) return;

    // 1. Recupero riferimenti e ID fondamentali
    const showdownId = document.getElementById('current-showdown-id')?.value;
    const matchNum = panel.dataset.currentMatchNum; 
    const stagione = (typeof stagioneAttiva !== 'undefined' && stagioneAttiva) ? stagioneAttiva : 'sbeta';

    if (!showdownId || !matchNum) {
        alert("Errore: ID Showdown o Numero Match mancante.");
        return;
    }

    // 2. Recupero riferimenti agli elementi HTML
    const team1Select = document.getElementById('match-team1'); 
    const team2Select = document.getElementById('match-team2');
    const p1Select = document.getElementById('match-player1');
    const p2Select = document.getElementById('match-player2');
    const scoreSelect = document.getElementById('match-score'); 
    const dataMatchInput = document.getElementById('match-date');
    const categoriaInput = document.getElementById('match-cat');

    // 3. Parsing del punteggio e validazione
    const scoreVal = scoreSelect.value;
    const [s1, s2] = scoreVal.split('-').map(val => parseInt(val) || 0);
    const dataMatch = dataMatchInput.value;
    const categoria = categoriaInput.value;

    if (!team1Select.value || !team2Select.value || !dataMatch) {
        alert("Per favore seleziona i Team per entrambi i giocatori e la data!");
        return;
    }

    // 4. Logica Punti e Identità Player
    const p1Id = p1Select.value.toLowerCase().trim();
    const p2Id = p2Select.value.toLowerCase().trim();
    const winnerId = s1 > s2 ? p1Id : p2Id;

    const totalSets = s1 + s2;
    const isBO3 = totalSets <= 3; 

    const calcolaPunti = (vinti, bo3) => {
        if (bo3) {
            if (vinti >= 2) return 2;
            if (vinti === 1) return 1;
            return 0;
        } else {
            if (vinti === 5) return 3;
            if (vinti >= 3) return 2;
            if (vinti === 2) return 1;
            return 0;
        }
    };

    const p1points = calcolaPunti(s1, isBO3);
    const p2points = calcolaPunti(s2, isBO3);

    // 5. Costruzione Replays
    const replays = {};
    for (let i = 1; i <= 5; i++) {
        const replayEl = document.getElementById(`replay-s${i}`);
        if (!replayEl) continue;
        const urlValue = replayEl.value.trim();
        const vincitoreVal = (typeof vincitoriSelezionati !== 'undefined') ? vincitoriSelezionati[`set${i}`] : ""; 
        
        if (urlValue || vincitoreVal) {
            replays[`set${i}`] = { 
                url: urlValue, 
                vincitore: vincitoreVal === 'D' ? "1" : (vincitoreVal === 'L' ? "2" : vincitoreVal)
            };
        }
    }

    // 6. Creazione dell'oggetto Match
    const datiMatch = {
        player1: p1Select.value,
        player1Id: p1Id,
        player2: p2Select.value,
        player2Id: p2Id,
        winnerId: winnerId,
        team1: team1Select.value,
        team2: team2Select.value,
        score: scoreVal,
        p1score: s1,
        p2score: s2,
        p1points: p1points,
        p2points: p2points,
        data: dataMatch,
        categoria: categoria,
        replays: replays,
        lastEdit: new Date().toISOString(),
        showdownId: showdownId
    };

    try {
        // 7. SALVATAGGIO MATCH
        const pathMatch = `seasons/${stagione}/showdowns/${showdownId}/matches/match${matchNum}`;
        await db.ref(pathMatch).set(datiMatch);

        // --- NUOVA LOGICA: CALCOLO DINAMICO VINCITORE SHOWDOWN ---
        // Recuperiamo tutti i match (incluso quello appena salvato)
        const sdSnap = await db.ref(`seasons/${stagione}/showdowns/${showdownId}/matches`).once('value');
        const allMatches = sdSnap.val() || {};
        const matchesArray = Object.values(allMatches);

        // Contatori vittorie match
        let winsRecord = {}; 

        matchesArray.forEach(m => {
            if (!m.winnerId) return;
            winsRecord[m.winnerId] = (winsRecord[m.winnerId] || 0) + 1;
        });

        // Determiniamo chi ha più vittorie nella serie
        let seriesWinnerId = null;
        let maxWins = 0;
        let isTie = false;

        Object.entries(winsRecord).forEach(([pId, count]) => {
            if (count > maxWins) {
                maxWins = count;
                seriesWinnerId = pId;
                isTie = false;
            } else if (count === maxWins) {
                isTie = true;
            }
        });

        // Aggiorniamo il nodo /info. 
        // Se c'è un pareggio (es. 1-1) o nessun match, il vincitoreShowdown viene rimosso/resettato
        // per evitare che un vecchio vincitore rimanga salvato dopo una modifica.
        const infoUpdate = {
            punteggioSerie: Object.entries(winsRecord).map(([id, w]) => `${id}: ${w}`).join(' vs '),
            ultimoAggiornamento: new Date().toISOString()
        };

        if (seriesWinnerId && !isTie && matchesArray.length >= 2) {
            infoUpdate.vincitoreShowdown = seriesWinnerId;
        } else {
            // Se modifichi e ora sono in pareggio, rimuoviamo il vincitore
            await db.ref(`seasons/${stagione}/showdowns/${showdownId}/info/vincitoreShowdown`).remove();
        }

        await db.ref(`seasons/${stagione}/showdowns/${showdownId}/info`).update(infoUpdate);

        // 8. SINCRONIZZAZIONE STATISTICHE
        if (typeof aggiornaLeaderboard === "function") {
            await aggiornaLeaderboard(stagione);
        }
        
        if (typeof ricalcolaStatisticheGlobali === "function") {
            await ricalcolaStatisticheGlobali(p1Id);
            await ricalcolaStatisticheGlobali(p2Id);
        }
        
        alert(`Match #${matchNum} salvato e vincitore serie ricalcolato!`);

        // 9. CHIUSURA E PULIZIA
        panel.style.display = 'none';
        if (typeof resetStatoModaleMatch === "function") {
            resetStatoModaleMatch();
        } else {
            if (typeof vincitoriSelezionati !== 'undefined') vincitoriSelezionati = {}; 
            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById(`replay-s${i}`);
                if(el) el.value = "";
            }
        }

        if (typeof aggiornaGraficaShowdown === "function") {
            aggiornaGraficaShowdown();
        }

    } catch (err) {
        console.error("Errore durante il salvataggio:", err);
        alert("Errore tecnico: " + err.message);
    }
}

async function ricalcolaStatisticheGlobali(pId) {
    try {
        const seasonsSnap = await db.ref(`seasons`).once('value');
        const seasons = seasonsSnap.val() || {};

        let globale = {
            played: 0, won: 0, lost: 0, setW: 0, setL: 0,
            allMatches: [],
            teamsMap: {}, 
            mvpMap: {}
        };

        // 1. Aggregazione dati da tutte le stagioni
        Object.keys(seasons).forEach(sId => {
            const stagioneObj = seasons[sId];
            const lb = stagioneObj.leaderboard;

            // --- Parte A: Stats aggregate dalla Leaderboard ---
            if (lb && lb[pId]) {
                const s = lb[pId];
                globale.won += (s.won || 0);
                globale.lost += (s.lost || 0);
                globale.setW += (s.setW || 0);
                globale.setL += (s.setL || 0);
                globale.played += ((s.won || 0) + (s.lost || 0));

                if (s.teams) {
                    Object.entries(s.teams).forEach(([tName, tData]) => {
                        if (!globale.teamsMap[tName]) {
                            globale.teamsMap[tName] = { 
                                name: tName, won: 0, lost: 0, setW: 0, setL: 0, played: 0, matchHistory: [] 
                            };
                        }
                        const t = globale.teamsMap[tName];
                        t.won += (tData.won || 0);
                        t.lost += (tData.lost || 0);
                        t.setW += (tData.setW || 0);
                        t.setL += (tData.setL || 0);
                        t.played += (tData.played || 0);
                    });
                }
            }

            // --- Parte B: Recupero Match dagli Showdowns per i Badges (Strike) ---
            const showdowns = stagioneObj.showdowns || {};
            Object.values(showdowns).forEach(sd => {
                const matches = sd.matches || {};
                Object.values(matches).forEach(m => {
                    // Verifichiamo se il player ha partecipato a questo match
                    if (m.player1Id === pId || m.player2Id === pId) {
                        // Aggiungiamo un timestamp di fallback se manca
                        const matchData = { ...m, sortDate: m.data || m.lastEdit };
                        globale.allMatches.push(matchData);
                        
                        const teamUsato = (m.player1Id === pId) ? m.team1 : m.team2;
                        if (globale.teamsMap[teamUsato]) {
                            globale.teamsMap[teamUsato].matchHistory.push(matchData);
                        }
                    }
                });
            });
        });

        // 2. Helper per calcolare Badges (Strike e Record)
        const calcolaBadges = (matches, playerId) => {
            // Ordiniamo i match cronologicamente
            matches.sort((a, b) => new Date(a.sortDate) - new Date(b.sortDate));
            
            let cWS = 0, mWS = 0, mWSDate = "-";
            let cCS = 0, mCS = 0, mCSDate = "-";

            matches.forEach(m => {
                const isWinner = (m.winnerId === playerId);
                const pScore = (m.player1Id === playerId) ? m.p1score : m.p2score;
                const oppScore = (m.player1Id === playerId) ? m.p2score : m.p1score;
                const mDate = m.data || "Data N.D.";

                if (isWinner) {
                    // Win Strike
                    cWS++;
                    if (cWS >= mWS) { mWS = cWS; mWSDate = mDate; }
                    
                    // Clean Strike (Vittoria senza perdere set, es: 2-0 o 3-0)
                    if (oppScore === 0) {
                        cCS++;
                        if (cCS >= mCS) { mCS = cCS; mCSDate = mDate; }
                    } else {
                        cCS = 0;
                    }
                } else {
                    // Reset delle strisce alla prima sconfitta
                    cWS = 0;
                    cCS = 0;
                }
            });

            return {
                wonstrike: cWS, 
                maxwonstrike: mWS, 
                maxwonstrikedate: mWSDate,
                cleanstrike: cCS, 
                maxcleanstrike: mCS, 
                maxcleanstrikedate: mCSDate
            };
        };

        // 3. Scrittura Stats Team nei nodi Player
        const playerRegistrySnap = await db.ref(`players/${pId}/teams`).once('value');
        const registeredTeams = playerRegistrySnap.val() || {};

        for (const [tId, tObj] of Object.entries(registeredTeams)) {
            const statsTeam = globale.teamsMap[tObj.nome];
            const path = `players/${pId}/teams/${tId}`;
            
            if (statsTeam) {
                await db.ref(`${path}/stats`).set({
                    played: statsTeam.played,
                    won: statsTeam.won,
                    lost: statsTeam.lost,
                    setW: statsTeam.setW,
                    setL: statsTeam.setL
                });
                const badgesTeam = calcolaBadges(statsTeam.matchHistory, pId);
                await db.ref(`${path}/badges`).set(badgesTeam);
            }
        }

        // 4. Calcolo MVP/Best e Scrittura Finali
        let bestTeam = { name: "-", won: 0, played: 0 };
        let mostUsedTeam = { name: "-", played: 0 };
        
        Object.values(globale.teamsMap).forEach(t => {
            if (t.played > mostUsedTeam.played) mostUsedTeam = t;
            // Best team basato su numero vittorie (con tie-break su meno partite giocate)
            if (t.won > bestTeam.won || (t.won === bestTeam.won && t.played < (bestTeam.played || Infinity))) {
                bestTeam = t;
            }
        });

        const playerBadges = calcolaBadges(globale.allMatches, pId);
        
        // Salvataggio atomico sotto players/pId/stats
        const statsRef = db.ref(`players/${pId}/stats`);
        await statsRef.update({
            'individual-stats': {
                played: globale.played, won: globale.won, lost: globale.lost, setW: globale.setW, setL: globale.setL
            },
            'badges': playerBadges,
            'team-stats': {
                bestteam: { name: bestTeam.name, won: bestTeam.won, played: bestTeam.played },
                mostusedteam: { name: mostUsedTeam.name, played: mostUsedTeam.played }
            }
        });

        console.log(`✅ Ricalcolo Globale completato per ${pId}`);

    } catch (e) {
        console.error("❌ Errore critico ricalcolo globale:", e);
    }
}

async function aggiornaLeaderboard(stagione) {
    try {
        // 1. Recupero dati necessari
        const showdownsSnap = await db.ref(`seasons/${stagione}/showdowns`).once('value');
        const showdowns = showdownsSnap.val() || {};
        
        const playersRegistrySnap = await db.ref(`players`).once('value');
        const playersRegistry = playersRegistrySnap.val() || {};

        const stats = {}; 

        // 2. Iteriamo attraverso ogni showdown
        Object.values(showdowns).forEach(sd => {
            const matches = sd.matches || {};
            const infoSD = sd.info || {};
            const vincitoreSerieID = infoSD.vincitoreShowdown;

            // Identifichiamo i due player dello showdown per assegnare S: W/L
            // Usiamo un Set per estrarre gli ID unici dai match di questo showdown
            const playerIdsInShowdown = new Set();

            // --- A. Processamento Match Singoli ---
            Object.values(matches).forEach(m => {
                if (m.player1Id) playerIdsInShowdown.add(m.player1Id);
                if (m.player2Id) playerIdsInShowdown.add(m.player2Id);

                const pData = [
                    { id: m.player1Id, teamNomeMatch: m.team1, score: m.p1score, oppScore: m.p2score, points: m.p1points },
                    { id: m.player2Id, teamNomeMatch: m.team2, score: m.p2score, oppScore: m.p1score, points: m.p2points }
                ];

                pData.forEach(p => {
                    if (!p.id) return;
                    
                    // Inizializzazione stats estesa con sdWon e sdLost
                    if (!stats[p.id]) {
                        stats[p.id] = { 
                            won: 0, lost: 0, setW: 0, setL: 0, points: 0,
                            sdWon: 0, sdLost: 0, // <--- NUOVI CAMPI
                            teams: {}, 
                            pkmnCounter: {}, 
                            records: {
                                mostUsedTeam: { name: "", presence: 0, won: 0, lost: 0, setW: 0, setL: 0 },
                                mostUsedPokemon: { name: "-", count: 0 },
                                mvpPokemon: { name: "-", wins: 0, played: 0, lose: 0, setW: 0, setL: 0 }
                            }
                        };
                    }

                    const s = stats[p.id];
                    const isWinner = p.score > p.oppScore;

                    s.won += isWinner ? 1 : 0;
                    s.lost += isWinner ? 0 : 1;
                    s.setW += (p.score || 0);
                    s.setL += (p.oppScore || 0);
                    s.points += (p.points || 0);

                    // Stats Team e Pokemon (Logica invariata)
                    const tNome = p.teamNomeMatch;
                    if (tNome) {
                        if (!s.teams[tNome]) s.teams[tNome] = { played: 0, won: 0, lost: 0, setW: 0, setL: 0 };
                        const st = s.teams[tNome];
                        st.played += 1;
                        st.won += isWinner ? 1 : 0;
                        st.lost += isWinner ? 0 : 1;
                        st.setW += (p.score || 0);
                        st.setL += (p.oppScore || 0);
                    }

                    const playerEntry = playersRegistry[p.id];
                    if (playerEntry && playerEntry.teams && tNome) {
                        const teamTrovato = Object.values(playerEntry.teams).find(t => t.nome === tNome);
                        if (teamTrovato && teamTrovato.pokemon) {
                            const nomiUnici = new Set();
                            Object.values(teamTrovato.pokemon).forEach(pObj => {
                                if (pObj && pObj.nome) nomiUnici.add(pObj.nome);
                            });
                            nomiUnici.forEach(nPkmn => {
                                if (!s.pkmnCounter[nPkmn]) s.pkmnCounter[nPkmn] = { count: 0, wins: 0, setW: 0, setL: 0 };
                                s.pkmnCounter[nPkmn].count += 1;
                                if (isWinner) s.pkmnCounter[nPkmn].wins += 1;
                                s.pkmnCounter[nPkmn].setW += (p.score || 0);
                                s.pkmnCounter[nPkmn].setL += (p.oppScore || 0);
                            });
                        }
                    }
                });
            });

            // --- B. Assegnazione S: W/L (Showdown Vinti/Persi) ---
            if (vincitoreSerieID && playerIdsInShowdown.has(vincitoreSerieID)) {
                // Chi ha vinto lo showdown
                if (stats[vincitoreSerieID]) {
                    stats[vincitoreSerieID].points += 1; // Punto bonus
                    stats[vincitoreSerieID].sdWon += 1;  // Vittoria Showdown
                }

                // Chi ha perso lo showdown
                playerIdsInShowdown.forEach(pid => {
                    if (pid !== vincitoreSerieID && stats[pid]) {
                        stats[pid].sdLost += 1; // Sconfitta Showdown
                    }
                });
            }
        });

        // 3. Elaborazione Record Finali (Invariata)
        for (const pid in stats) {
            const s = stats[pid];
            const getWinRate = (w, tot) => tot > 0 ? (w / tot) : 0;

            let bestT = { name: "", presence: -1, winRate: -1 };
            for (const [tn, td] of Object.entries(s.teams)) {
                const wr = getWinRate(td.won, td.played);
                if (td.played > bestT.presence || (td.played === bestT.presence && wr > bestT.winRate)) {
                    bestT = { name: tn, presence: td.played, winRate: wr };
                }
            }
            if (bestT.name) {
                const b = s.teams[bestT.name];
                s.records.mostUsedTeam = { name: bestT.name, presence: b.played, won: b.won, lost: b.lost, setW: b.setW, setL: b.setL };
            }

            let topPk = { name: "-", count: -1, winRate: -1 };
            let topMv = { name: "-", wins: -1, winRate: -1, data: null, setRate: -1 };
            for (const [pkName, pkData] of Object.entries(s.pkmnCounter)) {
                const wr = getWinRate(pkData.wins, pkData.count);
                const sr = getWinRate(pkData.setW, (pkData.setW + pkData.setL));
                if (pkData.count > topPk.count || (pkData.count === topPk.count && wr > topPk.winRate)) {
                    topPk = { name: pkName, count: pkData.count, winRate: wr };
                }
                if (pkData.wins > topMv.wins || (pkData.wins === topMv.wins && wr > topMv.winRate) || (pkData.wins === topMv.wins && wr === topMv.winRate && sr > topMv.setRate)) {
                    topMv = { name: pkName, wins: pkData.wins, winRate: wr, setRate: sr, data: pkData };
                }
            }
            s.records.mostUsedPokemon = { name: topPk.name, count: topPk.count };
            if (topMv.data) {
                s.records.mvpPokemon = { 
                    name: topMv.name, wins: topMv.wins, played: topMv.data.count,
                    lose: topMv.data.count - topMv.data.wins, setW: topMv.data.setW, setL: topMv.data.setL
                };
            }
            delete s.pkmnCounter; 
        }

        // 4. Salvataggio finale
        await db.ref(`seasons/${stagione}/leaderboard`).set(stats);
        console.log(`Leaderboard aggiornata con Bonus e SD W/L per: ${stagione}`);

    } catch (e) {
        console.error("Errore ricalcolo leaderboard:", e);
    }
}

async function verificaEDecretaVincitoreShowdown(stagione, showdownId) {
    const sdRef = db.ref(`seasons/${stagione}/showdowns/${showdownId}`);
    const snap = await sdRef.once('value');
    const sdData = snap.val();

    if (!sdData || !sdData.matches) return;

    const matches = Object.values(sdData.matches);
    // Supponiamo che uno showdown sia completo con 3 match
    // Se il numero di match può variare, puoi basarti su sdData.info.total_matches
    const totalPrevisti = 3; 

    if (matches.length >= totalPrevisti) {
        let p1Wins = 0;
        let p2Wins = 0;
        let p1Id = matches[0].player1Id;
        let p2Id = matches[0].player2Id;

        matches.forEach(m => {
            if (m.winnerId === p1Id) p1Wins++;
            else if (m.winnerId === p2Id) p2Wins++;
        });

        const winnerShowdownId = p1Wins > p2Wins ? p1Id : p2Id;

        // Salviamo nel nodo info dello showdown
        await sdRef.child('info').update({
            vincitoreShowdown: winnerShowdownId,
            isCompleted: true,
            punteggioShowdown: `${p1Wins}-${p2Wins}`
        });
        
        console.log(`Showdown ${showdownId} completato. Vincitore: ${winnerShowdownId}`);
    }
}

// --- 5. ELIMINAZIONE MATCH ---
async function eliminaMatch(showdownId, matchNum) {
    // 1. Definizione stagione
    const stagione = (typeof stagioneAttiva !== 'undefined' && stagioneAttiva) ? stagioneAttiva : 'sbeta';

    // 2. Conferma dell'utente
    if (confirm(`Eliminare definitivamente il Match #${matchNum} dello Showdown ${showdownId} dalla stagione ${stagione}?`)) {
        try {
            // 3. Percorso specifico nel nuovo schema
            const pathMatch = `seasons/${stagione}/showdowns/${showdownId}/matches/match${matchNum}`;
            
            // 4. Recupero dati per conoscere i player coinvolti (necessario per le stat globali)
            const matchSnap = await db.ref(pathMatch).once('value');
            const m = matchSnap.val();

            if (!m) {
                alert("Match non trovato o già eliminato.");
                return;
            }

            const p1Id = m.player1Id;
            const p2Id = m.player2Id;

            // 5. Eliminazione fisica dal database (solo dal nodo showdown)
            await db.ref(pathMatch).remove();

            console.log(`Match ${matchNum} rimosso da showdown ${showdownId}. Avvio ricalcolo...`);

            // 6. Ricalcolo Leaderboard stagionale 
            // (La nuova versione di aggiornaLeaderboard leggerà i restanti match dagli showdown)
            if (typeof aggiornaLeaderboard === "function") {
                await aggiornaLeaderboard(stagione);
            }

            // 7. Ricalcolo Statistiche Globali (Player + Team)
            if (typeof ricalcolaStatisticheGlobali === "function") {
                if (p1Id) await ricalcolaStatisticheGlobali(p1Id);
                if (p2Id) await ricalcolaStatisticheGlobali(p2Id);
            }

            alert("Match eliminato e statistiche ricalcolate con successo.");
            
            // 8. Refresh UI
            if (typeof aggiornaGraficaShowdown === "function") {
                aggiornaGraficaShowdown();
            }
            
            if (typeof inizializzaPaginaArchivio === "function") {
                inizializzaPaginaArchivio();
            }

        } catch (e) {
            console.error("Errore durante l'eliminazione:", e);
            alert("Errore tecnico durante l'eliminazione: " + e.message);
        }
    }
}


function selectWinner(setNum, winner, isEdit = false) {
    const prefix = isEdit ? "edit-" : "";
    // USIAMO SEMPRE LA STESSA CHIAVE 'set1', 'set2'
    const key = `set${setNum}`;
    
    // Identifichiamo i bottoni nel DOM (qui il prefisso serve per l'ID HTML)
    const btnD = document.getElementById(`${prefix}win-${setNum}-D`);
    const btnL = document.getElementById(`${prefix}win-${setNum}-L`);
    if (!btnD || !btnL) return;

    // --- LOGICA DI DESELEZIONE (TOGGLE) ---
    if (vincitoriSelezionati[key] === winner) {
        delete vincitoriSelezionati[key];
        btnD.classList.remove('active-D');
        btnL.classList.remove('active-L');
        return;
    }

    // --- LOGICA DI SELEZIONE NORMALE ---
    vincitoriSelezionati[key] = winner; // Qui salviamo 'D' o 'L'

    btnD.classList.remove('active-D');
    btnL.classList.remove('active-L');

    if (winner === 'D') {
        btnD.classList.add('active-D');
    } else if (winner === 'L') {
        btnL.classList.add('active-L');
    }
}

async function uploadNuovoReplay(setNum) {
    // Se non abbiamo ancora un ID per il nuovo match, lo generiamo ora
    let matchID = document.getElementById('match-id-nascosto').value;
    if (!matchID) {
        // Usiamo db.ref() per generare una chiave univoca
        matchID = db.ref().child('matches').push().key;
        document.getElementById('match-id-nascosto').value = matchID;
    }

    const fileInput = document.getElementById(`file-new-s${setNum}`);
    const textInput = document.getElementById(`replay-s${setNum}`);
    const file = fileInput.files[0];

    if (!file) return;

    textInput.value = "Uploading...";

    try {
        // Manteniamo la sintassi del bucket manuale che il tuo ambiente richiede
        const storageBucketName = 'pokemonsuite-didi-lu.firebasestorage.app'; 
        const storageRef = firebase.app().storage(storageBucketName).ref();
        const fileRef = storageRef.child(`replays/${matchID}/set${setNum}.html`);

        const metadata = { contentType: 'text/html' };
        
        // Eseguiamo l'upload
        const snapshot = await fileRef.put(file, metadata);
        const downloadURL = await snapshot.ref.getDownloadURL();

        // leggerà questo valore quando l'utente premerà "Add Match"
        textInput.value = downloadURL;
      
    } catch (error) {
        console.error("Errore upload nuovo replay:", error);
        alert("Upload error: " + error.message);
        textInput.value = "";
    }
}

async function uploadReplay(setNum) {
    // 1. Recupero ID fondamentali dal pannello
    const showdownId = document.getElementById('current-showdown-id')?.value;
    const panel = document.getElementById('admin-matches-panel');
    const matchNum = panel ? panel.dataset.currentMatchNum : null;
    
    const fileInput = document.getElementById(`file-s${setNum}`);
    const textInput = document.getElementById(`replay-s${setNum}`); // ID aggiornato per matchare il tuo HTML
    const file = fileInput.files[0];

    if (!file || !showdownId || !matchNum) {
        alert("Errore: ID Showdown, Numero Match o File mancante!");
        return;
    }

    textInput.value = "Uploading...";

    try {
        // 2. Configurazione Storage (Organizzato per Showdown e Match)
        const storageBucketName = 'pokemonsuite-didi-lu.firebasestorage.app'; 
        const storageRef = firebase.app().storage(storageBucketName).ref();
        
        // Nuovo percorso file: replays/showdown_ID/match_N/set_N.html
        const fileRef = storageRef.child(`replays/${showdownId}/match${matchNum}/set${setNum}.html`);

        const metadata = { contentType: 'text/html' };
        
        // 3. Esecuzione Upload
        const snapshot = await fileRef.put(file, metadata);
        const downloadURL = await snapshot.ref.getDownloadURL();

        // 4. Aggiornamento Database Realtime (Percorso Gerarchico)
        const stagione = (typeof stagioneAttiva !== 'undefined' && stagioneAttiva) ? stagioneAttiva : 'sbeta';
        
        const pathDB = `seasons/${stagione}/showdowns/${showdownId}/matches/match${matchNum}/replays/set${setNum}`;
        
        await db.ref(pathDB).update({
            url: downloadURL
        });

        // Aggiorna l'input visivo con l'URL finale
        textInput.value = downloadURL;
        alert(`Set ${setNum} caricato con successo!`);

    } catch (error) {
        console.error("Errore dettagliato nell'upload:", error);
        alert("Errore nell'upload: " + error.message);
        textInput.value = "";
    }
}
async function caricaVideoDirect(showdownId, matchNum, setNum, vincitore, btn) {
    // 1. GESTIONE CLASSE ACTIVE (Stato visivo del bottone)
    if (btn) {
        // Trova tutti i bottoni dei set nella modale e resetta la classe
        const tuttiIBottoni = document.querySelectorAll('.btn-set');
        tuttiIBottoni.forEach(b => b.classList.remove('is-selected'));

        // Aggiunge la classe al bottone appena cliccato
        btn.classList.add('is-selected');
    }

    // 2. Definizione stagione
    const stagione = (typeof stagioneAttiva !== 'undefined' && stagioneAttiva) ? stagioneAttiva : 'sbeta';

    try {
        // 3. RECUPERO DATI DA FIREBASE
        const pathMatch = `seasons/${stagione}/showdowns/${showdownId}/matches/match${matchNum}`;
        const snap = await db.ref(pathMatch).once('value');
        const m = snap.val();
        
        // Verifichiamo se esiste il set richiesto (es: set1, set2...)
        const setKey = `set${setNum}`;
        if (m && m.replays && m.replays[setKey]) {
            const replayData = m.replays[setKey];
            const urlOrFile = replayData.url;
            
            // Cerchiamo l'iframe nel DOM
            const iframe = document.getElementById('videoFrame') || document.getElementById('replayFrame');
            
            if (!iframe) {
                console.error("Iframe video non trovato nella pagina.");
                return;
            }

            // 4. Caricamento URL nell'iframe
            if (urlOrFile.startsWith('http')) {
                iframe.src = urlOrFile;
            } else {
                // Se è un percorso relativo (es: "partita1.mp4")
                iframe.src = `replays/${urlOrFile}`;
            }

            console.log(`✅ Replay Caricato: Showdown ${showdownId}, Match ${matchNum}, Set ${setNum}`);
        } else {
            console.warn("⚠️ Replay non trovato per:", setKey);
            alert("Replay non disponibile per questo set.");
        }
    } catch (e) {
        console.error("❌ Errore nel caricamento del video:", e);
    }
}

}

    const errorEl = document.getElementById('login-error');

    // Firebase Auth Login
    auth.signInWithEmailAndPassword(email, password)

    if (user) {
        try {
            const snapshot = await db.ref(`users/${user.uid}/name`).once('value');
            const userName = snapshot.val() || "User";
            authIcon.className = "fas fa-user-circle"; 
            authText.innerText = userName;

async function gestisciAccessoHub(seasonId, status, seasonName) {
    const user = firebase.auth().currentUser;

    if (status === 'open') {
        if (!user) {
            alert("Per iscriverti devi prima effettuare il login!");
            if (typeof toggleLoginModal === 'function') toggleLoginModal();
            return;
        }

        try {
            const userSnap = await db.ref(`users/${user.uid}`).once('value');
            const nomePlayer = userSnap.val()?.name;

            const seasonSnap = await db.ref(`seasons/${seasonId}`).once('value');
            const seasonData = seasonSnap.val();
            const info = seasonData.info || seasonData;

            // Controllo se già iscritto
            if (seasonData.iscritti && seasonData.iscritti[nomePlayer]) {
                window.location.href = `hub.html?id=${seasonId}`;
                return;
            }

            // Calcolo iscritti attuali
            const countIscritti = seasonData.iscritti ? Object.keys(seasonData.iscritti).length : 0;

            // Generazione lista formati (uno sopra l'altro)
            let formatiHtml = "";
            if (info.selected_formats) {
                Object.values(info.selected_formats).forEach(fmt => {
                    formatiHtml += `<li>${fmt}</li>`;
                });
            } else {
                formatiHtml = "<li>No formats selected</li>";
            }

            // Popolamento Modale con Layout a 2 Colonne
            document.getElementById('modal-season-name').innerText = `Register to: ${seasonName}`;
            document.getElementById('modal-season-rules').innerHTML = `
    <div class="modal-grid-layout">
        <div style="flex: 1;">
            <span class="modal-column-title">Formats</span>
            <div class="modal-format-list">
                ${formatiHtml}
            </div>
        </div>
        
        <div style="flex: 1;" class="modal-structure-list">
            <span class="modal-column-title">Structure</span>
            <div class="modal-info-box">
                Players:<strong> ${countIscritti} / ${info.participants_limit} </strong>
            </div>
            <div class="modal-info-box">
                Showdowns/Format:<strong> ${info.showdowns_per_format}</strong>
            </div>
            <div class="modal-info-box">
                Total Matches: <strong>${info.total_days} </strong>
            </div>
        </div>
    </div>
    <p style="margin-top: 25px; text-align: center; font-size: 0.85rem; opacity: 0.7; font-style: italic;">
        Clicking CONFIRM will register your profile to this competition.
    </p>
`;

            document.getElementById('btn-conferma-iscrizione').onclick = async () => {
                await db.ref(`seasons/${seasonId}/iscritti/${nomePlayer}`).set({
                    uid: user.uid,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                toggleIscrizioneModal();
                window.location.href = `hub.html?id=${seasonId}`;
            };

            toggleIscrizioneModal();

        } catch (error) {
            console.error(error);
            alert("Error loading season data.");
        }
    } else {
        window.location.href = `hub.html?id=${seasonId}`;
    }
}
