<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style-login.css">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="login-page">
    
    <div id="login-modal" class="modal">
    <div class="modal-content glass-card">
        <span class="close-modal" onclick="toggleLoginModal()"></span>
        <h2>Login</h2>
        <form id="login-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login-email" required placeholder="Your email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Login</button>
            <div id="login-error" class="error-msg"></div>
        </form>
    </div>
</div>

    <script>
        // Incolla qui il tuo firebaseConfig che hai in index-copy.html
        firebase.initializeApp(firebaseConfig);

        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    // Login successo! Reindirizza alla home
                    window.location.href = "index-copy.html";
                })
                .catch((error) => {
                    alert("Accesso negato: " + error.message);
                });
        }
    </script>
</body>
</html>
