function caricaStagioniHome() {
    console.log("⏳ Avvio caricamento stagioni...");
    const seasonsRef = db.ref('seasons');
    
    seasonsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            console.warn("⚠️ Nessun dato trovato nel nodo 'seasons'");
            return;
        }

        console.log("✅ Dati stagioni ricevuti");

        // 1. Ordinamento cronologico
        const allKeys = Object.keys(data).filter(key => key === 'sbeta' || /^s\d+$/.test(key));
        allKeys.sort((a, b) => {
            if (a === 'sbeta') return -1;
            if (b === 'sbeta') return 1;
            return parseInt(a.substring(1)) - parseInt(b.substring(1));
        });

        // 2. Suddivisione per stato
        const playing = [], open = [], closed = [];
        allKeys.forEach(key => {
            const info = data[key].info || data[key];
            const status = (info.status || "").toLowerCase();
            if (status === 'playing') playing.push(key);
            else if (status === 'open') open.push(key);
            else if (status === 'closed' || status === 'terminata') closed.push(key);
        });

        // 3. Logica di posizionamento [Last, Current, Next]
        let finalDisplay = [null, null, null];
        if (playing.length === 1) {
            finalDisplay[1] = playing[0];
            finalDisplay[0] = closed.length > 0 ? closed[closed.length - 1] : null;
            finalDisplay[2] = open.length > 0 ? open[0] : null;
        } else if (playing.length >= 2) {
            finalDisplay[0] = playing[playing.length - 2];
            finalDisplay[1] = playing[playing.length - 1];
            finalDisplay[2] = open[0] || null;
        } else {
            const lastThree = allKeys.slice(-3);
            finalDisplay = [lastThree[0] || null, lastThree[1] || null, lastThree[2] || null];
        }

        const mapping = [
            { key: finalDisplay[0], label: 'last' },
            { key: finalDisplay[1], label: 'current' },
            { key: finalDisplay[2], label: 'next' }
        ];

        // 4. Rendering delle Card
        mapping.forEach(item => {
            const seasonData = item.key ? data[item.key] : null;
            const info = seasonData ? (seasonData.info || seasonData) : null;
            
            const card = document.getElementById(`card-${item.label}`);
            const nameEl = document.getElementById(`${item.label}-name`);
            const rulesContainer = document.getElementById(`${item.label}-rules`);
            const footerEl = card ? card.querySelector('.card-footer') : null;
            const anchor = document.getElementById(`link-${item.label}`);

            if (item.key && info) {
                const status = (info.status || "open").toLowerCase();
                const seasonName = info.name || "Season " + item.key;
                
                if (nameEl) nameEl.innerText = seasonName;

                if (anchor) {
                    anchor.onclick = (e) => {
                        e.preventDefault();
                        if(typeof gestisciAccessoHub === 'function') gestisciAccessoHub(item.key, status, seasonName);
                    };
                }

                let bodyHtml = "";
                let footerHtml = "";

                if (status === 'closed' || status === 'terminata') {
                    const vincitore = info.winner || "---";
                    bodyHtml = `<p class="winner-label">Winner:</p><p class="winner-display">${vincitore}</p>`;
                    footerHtml = `<span class="badge-closed">CLOSED</span>`;
                
                } else if (status === 'playing') {
                    // --- CALCOLO LEADER ---
                    let leader = "---";
                    if (seasonData.leaderboard) {
                        let max = -1;
                        Object.keys(seasonData.leaderboard).forEach(playerName => {
                            const p = seasonData.leaderboard[playerName];
                            const pts = Number(p.points || 0);
                            if (pts > max) { max = pts; leader = playerName; }
                        });
                    }

                    // Aggiungiamo un ID specifico al div leader-name per colorarlo via JS
                    bodyHtml = `<div class="playing-box">Current Leader:</div><div id="leader-display-${item.label}" class="leader-name">${leader}</div>`;
                    footerHtml = `<span class="live-dot">●</span>PLAYING`;

                    // --- RECUPERO COLORE DAL PLAYER (lowercase) ---
                    if (leader !== "---") {
                        const playerKey = leader.toLowerCase().trim();
                        db.ref(`players/${playerKey}/info/color`).once('value', (cSnap) => {
                            const userColor = cSnap.val();
                            const leaderEl = document.getElementById(`leader-display-${item.label}`);
                            if (leaderEl && userColor) {
                                leaderEl.style.backgroundColor = userColor;
                                // Opzionale: aggiungi bordo nero per stile neubrutalism se manca
                                leaderEl.style.border = "3px solid #000";
                            }
                        });
                    }
                
                } else if (status === 'open') {
                    bodyHtml = `<div class="countdown-box">Closes in:</div><div><div id="timer-${item.label}" class="timer-display">--d --h --m</div></div>`;
                    footerHtml = `<span class="badge-open">OPEN</span>`;
                    if (info.deadline) setTimeout(() => {
                        if(typeof startCountdown === 'function') startCountdown(info.deadline, `timer-${item.label}`);
                    }, 100);
                }

                if (rulesContainer) rulesContainer.innerHTML = bodyHtml;
                if (footerEl) footerEl.innerHTML = footerHtml;
                if (card) {
                    card.style.opacity = "1";
                    card.style.display = "flex";
                    card.className = `season-card status-${status.replace(/\s+/g, '-')}`;
                }
            } else {
                // SLOT VUOTO
                if (nameEl) nameEl.innerText = "TBD";
                if (rulesContainer) rulesContainer.innerHTML = "<p>Coming Soon</p>";
                if (footerEl) footerEl.innerHTML = "---";
                if (card) {
                    card.style.opacity = "0.5";
                    card.className = `season-card status-empty`;
                }
            }
        });
    }, (error) => {
        console.error("❌ Errore Firebase Database:", error);
    });
}

// Funzione per scurire o schiarire un colore HEX
function pSBC(p, c0, c1, l) {
    let r, g, b, P, f, t, h, i = parseInt, m = Math.round, a = typeof (c1) == "string";
    if (typeof (p) != "number" || p < -1 || p > 1 || typeof (c0) != "string" || (c0[0] != 'r' && c0[0] != '#') || (c1 && !a)) return null;
    if (!this.pSBCr) this.pSBCr = (d) => {
        let n = d.length, x = {};
        if (n > 9) {
            [r, g, b, a] = d = d.split(","), n = d.length;
            if (n < 3 || n > 4) return null;
            x.r = i(r[3] == "a" ? r.slice(5) : r.slice(4)), x.g = i(g), x.b = i(b), x.a = a ? parseFloat(a) : -1
        } else {
            if (n == 8 || n == 6 || n < 4) return null;
            if (n < 6) d = "#" + d[1] + d[1] + d[2] + d[2] + d[3] + d[3] + (n > 4 ? d[4] + d[4] : "");
            d = i(d.slice(1), 16);
            if (n == 9 || n == 5) x.r = d >> 24 & 255, x.g = d >> 16 & 255, x.b = d >> 8 & 255, x.a = m((d & 255) / 0.255) / 1000;
            else x.r = d >> 16, x.g = d >> 8 & 255, x.b = d & 255, x.a = -1
        } return x
    };
    h = c0.length > 9, f = this.pSBCr(c0);
    if (!f) return null;
    if (p < 0) p *= -1, t = { r: 0, g: 0, b: 0, a: f.a };
    else t = { r: 255, g: 255, b: 255, a: f.a };
    r = m((t.r - f.r) * p) + f.r, g = m((t.g - f.g) * p) + f.g, b = m((t.b - f.b) * p) + f.b;
    return "#" + (0x1000000 + (f.a != -1 ? m(f.a * 255) : 0) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function getPlayerPalette(baseColor) {
    if (!baseColor) baseColor = "#31c489";
    
    return {
        base: baseColor,
        dark: pSBC(-0.4, baseColor),
        darker: pSBC(-0.7, baseColor),
        light: pSBC(0.6, baseColor),
        tag: pSBC(-0.5, baseColor),
        bright: pSBC(0.3, baseColor)
    };
}

function toggleMusic() {
    // 1. Identifica il player (usa l'ID presente in questa pagina, es. bg-music-home)
    const player = document.getElementById('bg-music-home');
    const musicBtn = document.getElementById('music-control');

    if (!player || !musicBtn) {
        console.error("Elementi audio o tasto non trovati in questa pagina.");
        return;
    }

    if (player.paused) {
        player.play().then(() => {
            // Se parte, rimuoviamo la sbarra e salviamo la preferenza 'on'
            musicBtn.classList.remove('muted');
            localStorage.setItem('userMusicPref', 'on');
        }).catch(error => {
            console.warn("Autoplay bloccato o errore riproduzione:", error);
        });
        
    } else {
        player.pause();
        // Aggiungiamo la sbarra e salviamo la preferenza 'off'
        musicBtn.classList.add('muted');
        localStorage.setItem('userMusicPref', 'off');
    }
}

/** * AGGIUNTA FONDAMENTALE: 
 * Al caricamento della pagina, controlla se l'utente aveva precedentemente 
 * silenziato la musica in un'altra parte del sito.
 */
window.addEventListener('DOMContentLoaded', () => {
    const player = document.getElementById('bg-music-home');
    const musicBtn = document.getElementById('music-control');
    const savedPref = localStorage.getItem('userMusicPref');

    if (player && musicBtn) {
        if (savedPref === 'off') {
            // Se l'utente ha scelto 'off' altrove, non far partire nulla
            player.pause();
            musicBtn.classList.add('muted');
        } else {
            // Altrimenti prova a farla partire (rispettando i blocchi del browser)
            player.play().catch(() => {
                musicBtn.classList.add('muted');
            });
        }
    }
});


// Seleziona l'elemento del modale
const loginModal = document.getElementById('login-modal');

// Aggiungi l'evento click
loginModal.addEventListener('click', (event) => {
    // Se il clic è avvenuto esattamente sul background (id="login-modal")
    // e NON sulla card contenuta al suo interno
    if (event.target === loginModal) {
        toggleLoginModal(); // Chiama la tua funzione per chiudere
    }
});

// Funzione per applicare il colore alla TopBar (centralizzata)
async function applicaColoreUtente(user) {
    const topBar = document.querySelector('.top-bar');
    if (!user || !topBar) return;

    try {
        const nameSnap = await db.ref(`users/${user.uid}/name`).once('value');
        const userName = nameSnap.val();

        if (userName) {
            console.log("👤 Utente riconosciuto:", userName);
            const colorSnap = await db.ref(`players/${userName.toLowerCase().trim()}/info/color`).once('value');
            if (colorSnap.exists()) {
                const userColor = colorSnap.val();
                topBar.style.setProperty('background-color', userColor, 'important');
                console.log("🎨 Colore applicato:", userColor);
            }
        }
    } catch (e) {
        console.error("❌ Errore recupero colore:", e);
    }
}

function toggleIscrizioneModal() {
    const modal = document.getElementById('modal-iscrizione');
    const overlay = document.getElementById('modal-overlay');
    const isVisible = modal.style.display === 'block';
    
    modal.style.display = isVisible ? 'none' : 'block';
    overlay.style.display = isVisible ? 'none' : 'block';
}

async function gestisciAccessoHub(seasonId, status, seasonName) {
    const user = firebase.auth().currentUser;
    const s = status ? status.toLowerCase() : "";

    // --- LOGICA REDIRECT DIRETTO (NON "OPEN") ---
    if (s === 'playing') {
        window.location.href = `matches.html?id=${seasonId}`;
        return;
    } 
    
    if (s === 'closed' || s === 'terminata') {
        // Puoi decidere se mandarli ai match per vedere lo storico o lasciarli nell'hub
        window.location.href = `matches.html?id=${seasonId}`;
        return;
    }

    // --- LOGICA ISCRIZIONE (STATUS "OPEN") ---
    if (s === 'open') {
        if (!user) {
            alert("Per iscriverti devi prima effettuare il login!");
            if (typeof toggleLoginModal === 'function') toggleLoginModal();
            return;
        }

        try {
            // Recupero dati utente e stagione in parallelo per velocità
            const [userSnap, seasonSnap] = await Promise.all([
                db.ref(`users/${user.uid}`).once('value'),
                db.ref(`seasons/${seasonId}`).once('value')
            ]);

            const nomePlayer = userSnap.val()?.name;
            const seasonData = seasonSnap.val() || {};
            const info = seasonData.info || seasonData;

            if (!nomePlayer) {
                alert("Completa il tuo profilo con un nome utente prima di iscriverti!");
                return;
            }

            // 1. Controllo se già iscritto -> Vai all'Hub per gestire il team
            if (seasonData.iscritti && seasonData.iscritti[nomePlayer]) {
                window.location.href = `hub.html?id=${seasonId}`;
                return;
            }

            // 2. Controllo Limite Partecipanti
            const countIscritti = seasonData.iscritti ? Object.keys(seasonData.iscritti).length : 0;
            const limit = info.participants_limit || 0;

            if (limit > 0 && countIscritti >= limit) {
                alert("Spiacente, questa stagione ha raggiunto il limite massimo di partecipanti.");
                return;
            }

            // 3. Preparazione Formati HTML
            let formatiHtml = "";
            if (info.selected_formats) {
                Object.values(info.selected_formats).forEach(fmt => {
                    formatiHtml += `<li>${fmt}</li>`;
                });
            } else {
                formatiHtml = "<li>No formats selected</li>";
            }

            // 4. Popolamento Modale con Layout Neubrutalist
            document.getElementById('modal-season-name').innerText = `Register to: ${seasonName}`;
            document.getElementById('modal-season-rules').innerHTML = `
                <div class="modal-grid-layout" style="display: flex; gap: 20px; text-align: left;">
                    <div style="flex: 1;">
                        <span class="modal-column-title" style="display: block; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; border-bottom: 2px solid #000;">Formats</span>
                        <ul class="modal-format-list" style="list-style: none; padding: 0; font-weight: 700;">
                            ${formatiHtml}
                        </ul>
                    </div>
                    
                    <div style="flex: 1;" class="modal-structure-list">
                        <span class="modal-column-title" style="display: block; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; border-bottom: 2px solid #000;">Structure</span>
                        <div class="modal-info-box" style="margin-bottom: 5px;">Players: <strong>${countIscritti} / ${limit}</strong></div>
                        <div class="modal-info-box" style="margin-bottom: 5px;">Showdowns: <strong>${info.showdowns_per_format || 0}</strong></div>
                        <div class="modal-info-box" style="margin-bottom: 5px;">Days: <strong>${info.total_days || 0}</strong></div>
                    </div>
                </div>
                <p style="margin-top: 25px; text-align: center; font-size: 0.85rem; opacity: 0.7; font-style: italic;">
                    Clicking CONFIRM will register your profile to this competition.
                </p>
            `;

            // 5. Gestione Click Conferma
            document.getElementById('btn-conferma-iscrizione').onclick = async () => {
                try {
                    await db.ref(`seasons/${seasonId}/iscritti/${nomePlayer}`).set({
                        uid: user.uid,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    
                    if (typeof toggleIscrizioneModal === 'function') toggleIscrizioneModal();
                    window.location.href = `hub.html?id=${seasonId}`;
                } catch (err) {
                    console.error("Errore durante l'iscrizione:", err);
                    alert("Si è verificato un errore durante l'invio dell'iscrizione.");
                }
            };

            // Mostra il modale
            if (typeof toggleIscrizioneModal === 'function') toggleIscrizioneModal();

        } catch (error) {
            console.error("Errore caricamento dati stagione:", error);
            alert("Error loading season data.");
        }
    } else {
        // Fallback generico
        window.location.href = `hub.html?id=${seasonId}`;
    }
}

async function calcolaVincitoreStagione(seasonId) {
    try {
        const seasonRef = db.ref(`seasons/${seasonId}`);
        const snapshot = await seasonRef.once('value');
        const seasonData = snapshot.val();

        if (!seasonData || !seasonData.matches) {
            console.error("Nessun match trovato.");
            return;
        }

        const matches = seasonData.matches;
        const stats = {}; 

        // Ciclo su ogni singolo match
        Object.keys(matches).forEach(matchId => {
            const m = matches[matchId];

            const id1 = m.player1Id; 
            const id2 = m.player2Id; 
            
            const p1Points = parseFloat(m.p1_points) || 0;
            const p2Points = parseFloat(m.p2_points) || 0;

            if (id1) {
                if (!stats[id1]) stats[id1] = { points: 0, played: 0 };
                stats[id1].points += p1Points;
                stats[id1].played += 1;
            }

            if (id2) {
                if (!stats[id2]) stats[id2] = { points: 0, played: 0 };
                stats[id2].points += p2Points;
                stats[id2].played += 1;
            }
        });

        console.log("RIEPILOGO TOTALI CALCOLATI:", stats);

        let winnerName = "";
        let maxPoints = -1;

        Object.keys(stats).forEach(playerId => {
            if (stats[playerId].points > maxPoints) {
                maxPoints = stats[playerId].points;
                winnerName = playerId;
            }
        });

        const updates = {};
        updates[`seasons/${seasonId}/leaderboard`] = stats;
        updates[`seasons/${seasonId}/info/winner`] = winnerName;

        await db.ref().update(updates);
        console.log("Firebase aggiornato! Vincitore:", winnerName, "con punti:", maxPoints);

    } catch (e) {
        console.error("Errore:", e);
    }
}



function getTop(collection, criterion) {
    const keys = Object.keys(collection);
    if (keys.length === 0) return { name: "N/A", played: 0, win: 0, loss: 0, setW: 0, setL: 0, format: "N/A" };
    const topKey = keys.reduce((a, b) => (collection[a][criterion] >= collection[b][criterion] ? a : b));
    return collection[topKey];
}

const musicBtn = document.getElementById('music-toggle');
const audio = document.getElementById('bg-music-home');

musicBtn.addEventListener('click', (e) => {
    e.stopPropagation(); 
    if (audio.paused) {
        audio.play();
        musicBtn.innerText = "🔊";
    } else {
        audio.pause();
        musicBtn.innerText = "🔇";
    }
});



let countdownInterval;

function startCountdown(deadlineStr, elementId) {
    const timerDisplay = document.getElementById(elementId);
    if (!timerDisplay) return;
    
    // Usiamo un oggetto globale per gestire i vari intervalli senza sovrascriverli
    if (!window.activeIntervals) window.activeIntervals = {};
    if (window.activeIntervals[elementId]) clearInterval(window.activeIntervals[elementId]);
    
    const targetDate = new Date(deadlineStr).getTime();

    const updateTimer = () => {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance < 0) {
            clearInterval(window.activeIntervals[elementId]);
            timerDisplay.innerText = "Registrations closed";
            return;
        }

        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);

        timerDisplay.innerText = `${d}d ${h}h ${m}m ${s}s`;
    };

    updateTimer(); // Esegui subito il primo calcolo
    window.activeIntervals[elementId] = setInterval(updateTimer, 1000);
}
