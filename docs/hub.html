// Funzione per scurire o schiarire un colore HEX
function pSBC(p, c0, c1, l) {
    let r, g, b, P, f, t, h, i = parseInt, m = Math.round, a = typeof (c1) == "string";
    if (typeof (p) != "number" || p < -1 || p > 1 || typeof (c0) != "string" || (c0[0] != 'r' && c0[0] != '#') || (c1 && !a)) return null;
    if (!this.pSBCr) this.pSBCr = (d) => {
        let n = d.length, x = {};
        if (n > 9) {
            [r, g, b, a] = d = d.split(","), n = d.length;
            if (n < 3 || n > 4) return null;
            x.r = i(r[3] == "a" ? r.slice(5) : r.slice(4)), x.g = i(g), x.b = i(b), x.a = a ? parseFloat(a) : -1
        } else {
            if (n == 8 || n == 6 || n < 4) return null;
            if (n < 6) d = "#" + d[1] + d[1] + d[2] + d[2] + d[3] + d[3] + (n > 4 ? d[4] + d[4] : "");
            d = i(d.slice(1), 16);
            if (n == 9 || n == 5) x.r = d >> 24 & 255, x.g = d >> 16 & 255, x.b = d >> 8 & 255, x.a = m((d & 255) / 0.255) / 1000;
            else x.r = d >> 16, x.g = d >> 8 & 255, x.b = d & 255, x.a = -1
        } return x
    };
    h = c0.length > 9, f = this.pSBCr(c0);
    if (!f) return null;
    if (p < 0) p *= -1, t = { r: 0, g: 0, b: 0, a: f.a };
    else t = { r: 255, g: 255, b: 255, a: f.a };
    r = m((t.r - f.r) * p) + f.r, g = m((t.g - f.g) * p) + f.g, b = m((t.b - f.b) * p) + f.b;
    return "#" + (0x1000000 + (f.a != -1 ? m(f.a * 255) : 0) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

async function getPlayerPalette(playerName) {
    const snap = await db.ref(`players/${playerName}/info/color`).once('value');
    const baseColor = snap.val() || "#31c489"; // Colore scelto dall'utente

    return {
        base: baseColor,
        border: pSBC(-0.8, baseColor), // 40% più scuro per i bordi
        light: pSBC(0.8, baseColor) + "22", // 80% più chiaro + trasparenza per sfondi
        text: pSBC(-0.6, baseColor) // Molto scuro per il testo leggibile
    };
}

// 3. Funzione di Avvio Unica
// Variable di controllo globale per gestire i rendering asincroni
let currentRenderID = 0;

async function initHub() {
    const user = auth.currentUser;
    if (!user) return;

    // seasonId deve essere disponibile globalmente o estratto dall'URL prima di initHub
    if (typeof seasonId === 'undefined' || !seasonId) {
        alert("ID Stagione mancante nell'URL!");
        return;
    }

    try {
        // 1. Recupero dati utente una tantum
        const userSnap = await db.ref(`users/${user.uid}`).once('value');
        const userData = userSnap.val();
        if (!userData || !userData.name) return;

        const nomeUtenteClean = userData.name.toLowerCase();
        let lastAlertTime = 0;

        // 2. Pulizia listener precedenti per evitare doppie esecuzioni
        db.ref(`seasons/${seasonId}`).off();

        // 3. Avvio listener Real-time
        db.ref(`seasons/${seasonId}`).on('value', async (snap) => {
            const data = snap.val();
            if (!data) return;

            // Incrementiamo l'ID per invalidare eventuali renderHub asincroni precedenti
            currentRenderID++;
            const myRenderID = currentRenderID;

            // --- AGGIORNAMENTO TICKER (LIVE) ---
            // Passiamo i dati appena ricevuti così il ticker si aggiorna se qualcuno si iscrive
            if (typeof caricaTickerIscrizione === 'function') {
                caricaTickerIscrizione(data, seasonId);
            }

            const status = (data.info?.status || 'OPEN').toUpperCase();

            // --- Aggiornamento UI Immediata (Sincrona) ---
            const titleDisp = document.getElementById('hub-title-display');
            if (titleDisp) titleDisp.innerText = data.info?.name || "Season Hub";
            
            if (typeof updatePageStatus === 'function') {
                updatePageStatus(status);
            }
            
            const teamsLimitDisplay = data.info?.teams_per_format === "No Limit" ? "No Limit" : (data.info?.teams_per_format || 1);
            const rulesCont = document.getElementById('hub-rules-content');
            if (rulesCont) {
                rulesCont.innerHTML = `
                    <p><strong>Status:</strong> ${status}</p>
                    <p><strong>Teams per Format:</strong> ${teamsLimitDisplay}</p>
                `;
            }

            // --- Gestione Rendering Hub ---
            if (status === 'CLOSED') {
                if (typeof renderClosedHub === 'function') renderClosedHub(data); 
            } else {
                // Rendering asincrono della griglia/team
                if (typeof renderHub === 'function') {
                    await renderHub(data, nomeUtenteClean, myRenderID);
                }

                // Logica Alert (solo se il render è ancora quello attuale)
                if (myRenderID === currentRenderID) {
                    const now = Date.now();
                    if (now - lastAlertTime > 5000) {
                        if (typeof checkOverlimitWarning === 'function') {
                            if (checkOverlimitWarning(data, nomeUtenteClean)) {
                                lastAlertTime = now;
                            }
                        }
                    }
                }
            }
        });
    } catch (error) {
        console.error("Errore critico durante l'inizializzazione dell'Hub:", error);
    }
}

function renderClosedHub(data) {

    // 1. Box di riepilogo (Header della Classifica)

            <h2 style="margin: 0; font-family: 'Josefin Sans'; font-size: 1.5rem; text-transform: uppercase;">🏆 Season Results</h2>
            <p style="margin: 5px 0 0 0; font-family: 'Montserrat'; font-weight: 600; font-size: 0.9rem;">The showdown has ended. Here are the final standings.</p>
        </div>
    `;

    // 2. Costruzione della Tabella Classifica
    // Ordiniamo i player per punti (decrescente)
    const sortedPlayers = Object.entries(leaderboard)
        .sort(([, a], [, b]) => (b.points || 0) - (a.points || 0));

    if (sortedPlayers.length === 0) {
        btnContainer.innerHTML = `
            <div style="padding: 40px; text-align: center; font-family: 'Montserrat'; border: 3px dashed #000;">
                <p>No leaderboard data available yet.</p>
            </div>
        `;
    } else {
        let tableRows = sortedPlayers.map(([name, stats], index) => {
            const isTop1 = index === 0;
            const rowBg = isTop1 ? '#31c489' : '#fff'; // Verde per il vincitore, bianco per gli altri
            const textColor = isTop1 ? '#fff' : '#000';

            return `
                <tr style="background: ${rowBg}; color: ${textColor}; border-bottom: 3px solid #000;">
                    <td style="padding: 15px; font-weight: 900; border-right: 3px solid #000;">#${index + 1}</td>
                    <td style="padding: 15px; font-weight: 700; text-transform: uppercase; border-right: 3px solid #000;">${name}</td>
                    <td style="padding: 15px; font-weight: 900; text-align: center; border-right: 3px solid #000;">${stats.points || 0}</td>
                    <td style="padding: 15px; text-align: center; font-weight: 600;">${stats.wins || 0}W - ${stats.losses || 0}L</td>
                </tr>
            `;
        }).join('');

        btnContainer.innerHTML = `
            <div style="border: 3px solid #000; box-shadow: 8px 8px 0px #000; background: #fff; width: 100%;">
                <table style="width: 100%; border-collapse: collapse; font-family: 'Montserrat';">
                    <thead>
                        <tr style="background: #000; color: #fff; text-align: left; text-transform: uppercase; font-size: 0.8rem;">
                            <th style="padding: 12px; border-right: 3px solid #fff;">Rank</th>
                            <th style="padding: 12px; border-right: 3px solid #fff;">Trainer</th>
                            <th style="padding: 12px; text-align: center; border-right: 3px solid #fff;">Points</th>
                            <th style="padding: 12px; text-align: center;">Record</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            </div>
        `;
    }

    // 3. Sidebar (opzionale: Hall of Fame)
    const partList = document.getElementById('participants-list');
    const partCardTitle = document.querySelector('.participants-card h3');
    if (partCardTitle) partCardTitle.innerText = "SEASON MVP";
    
    if (sortedPlayers.length > 0) {
        partList.innerHTML = `
            <div style="padding: 10px; text-align: center;">
                <div style="font-size: 2rem;">👑</div>
                <strong style="display: block; font-size: 1.2rem; text-transform: uppercase;">${sortedPlayers[0][0]}</strong>
                <p style="font-size: 0.8rem; color: #666;">Season Champion</p>
            </div>
        `;
    }
}


function checkOverlimitWarning(data, nomeUtenteClean) {
    const info = data.info || {};
    const teamsIscritti = data.teams_iscritti || {};
    
    // Se è No Limit, non può esserci overlimit
    if (info.teams_per_format === "No Limit") return;

    const maxAllowed = parseInt(info.teams_per_format) || 1;
    let overlimitFormats = [];

    // Controlliamo ogni formato selezionato nella stagione
    const formats = Array.isArray(info.selected_formats) ? info.selected_formats : Object.values(info.selected_formats || {});

    formats.forEach(format => {
        const iscrizione = teamsIscritti[format] ? teamsIscritti[format][nomeUtenteClean] : null;
        const count = iscrizione ? (iscrizione.count || 0) : 0;

        if (count > maxAllowed) {
            overlimitFormats.push(format.toUpperCase());
        }
    });

    // Se abbiamo trovato dei formati fuori regola, mostriamo l'avviso
    if (overlimitFormats.length > 0) {
        // Usiamo un piccolo timeout per non bloccare il rendering iniziale
        setTimeout(() => {
            alert(
                `⚠️ ATTENTION!\n\nRules have changed: for the format(s) [${overlimitFormats.join(", ")}] you have too many teams registered.\n\nPlease open the format and deselect the extra teams to fix your registration.`
            );
        }, 500);
    }
}

/**
 * Aggiorna il ticker della pagina Iscrizione/Hub
 * @param {Object} data - L'oggetto snap.val() della stagione
 * @param {string} sId - L'ID della stagione (es. season_4)
 */
function caricaTickerIscrizione(data, sId) {
    try {
        if (!data) return;

        const tickerWrap = document.getElementById('lastMatchTicker');
        if (!tickerWrap) return;

        const info = data.info || {};
        const nomeStagione = info.name || sId || "Unknown Season";

        // 1. Gestione Deadline (ISO 2026-03-31T17:30 -> 31-03-26 @ 17:30)
        let scadenzaRaw = info.deadline || "";
        let scadenzaFormattata = "TBD";
        if (scadenzaRaw && scadenzaRaw.includes('T')) {
            const [dataPart, oraPart] = scadenzaRaw.split('T');
            const [anno, mese, giorno] = dataPart.split('-');
            scadenzaFormattata = `${giorno}-${mese}-${anno.slice(-2)} @ ${oraPart}`;
        }

        // 2. Conteggio Partecipanti dal nodo "iscritti"
        const iscritti = data.iscritti ? Object.keys(data.iscritti).length : 0;
        
        // 3. Limite Massimo da info/participants_limit
        const maxPartecipanti = info.participants_limit || 16; 
        
        let partDisplay = `${iscritti}/${maxPartecipanti}`;
        if (iscritti >= maxPartecipanti && maxPartecipanti !== 0) {
            partDisplay = "SOLD OUT! ⚠";
        }

        // 4. Numero Showdowns da info/total_days
        const numShowdowns = info.total_days || 0;

        // --- COMPOSIZIONE FINALE ---
        const testoNews = ` ▪ NEXT SEASON: ${nomeStagione.toUpperCase()} ► DEADLINE: ${scadenzaFormattata} ► PLAYERS: ${partDisplay} ► SHOWDOWNS: ${numShowdowns} ▪ NEXT SEASON: ${nomeStagione.toUpperCase()} ► DEADLINE: ${scadenzaFormattata} ► PLAYERS: ${partDisplay} ► SHOWDOWNS: ${numShowdowns}`;

        // Inserimento HTML (duplicato per scroll infinito)
        tickerWrap.innerHTML = `<div class="ticker-item">${testoNews}</div><div class="ticker-item">${testoNews}</div>`;

        // --- LOGICA VELOCITÀ COSTANTE (NOVITÀ) ---
        const pixelAlSecondo = 60; // Più alto = più veloce. Imposta lo stesso valore in ogni pagina.
        const larghezzaTesto = tickerWrap.scrollWidth / 2; 
        const durataCalcolata = larghezzaTesto / pixelAlSecondo;

        // Applica la durata direttamente all'elemento
        tickerWrap.style.animationDuration = `${durataCalcolata}s`;

    } catch (e) {
        console.error("Errore aggiornamento ticker iscrizione:", e);
    }
}
// 4. Rendering dell'Hub
async function renderHub(data, nomeUtenteClean, myRenderID) {
    const info = data.info || {};
    const teamsIscritti = data.teams_iscritti || {};
    
    // --- 1. LOGICA NO LIMIT E INFO (Sincrona) ---
    const isNoLimit = info.teams_per_format === "No Limit";
    const maxTeamsPerFormat = isNoLimit ? Infinity : (parseInt(info.teams_per_format) || 1);
    const limitLabel = isNoLimit ? "No Limit" : `${maxTeamsPerFormat} TEAMS PER FORMAT`;

    const countIscritti = data.iscritti ? Object.keys(data.iscritti).length : 0;
    const limitIscritti = info.participants_limit || "0";

    const summaryBox = document.getElementById('season-summary-content');
    if (summaryBox) {
        let deadlineDisplay = "NOT SET";
        if (info.deadline) {
            const d = new Date(info.deadline);
            deadlineDisplay = d.toLocaleDateString('it-IT') + " " + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }
        summaryBox.innerHTML = `
            <div class="hub-info-list" style="display: flex; flex-direction: column; gap: 8px;">
                <div class="info-row"><strong>STATUS:</strong> ${info.status?.toUpperCase() || 'OPEN'}</div>
                <div class="info-row"><strong>LIMIT:</strong> ${limitLabel}</div>
                <div class="info-row"><strong>DEADLINE:</strong> ${deadlineDisplay}</div>
                <div class="info-row"><strong>TOTAL SHOWDOWNS:</strong> ${info.total_days || 0}</div>
            </div>
        `;
    }

    // --- 2. BOTTONI REGISTRAZIONE ---
    const btnContainer = document.getElementById('registration-buttons-container');
    btnContainer.innerHTML = '';

    if (info.selected_formats) {
        const formats = Array.isArray(info.selected_formats) ? info.selected_formats : Object.values(info.selected_formats);
        formats.forEach(format => {
            const iscrizione = teamsIscritti[format] ? teamsIscritti[format][nomeUtenteClean] : null;
            const count = iscrizione ? (iscrizione.count || 0) : 0;
            const isOverLimit = !isNoLimit && count > maxTeamsPerFormat;
            const isFull = isNoLimit ? (count > 0) : (count >= maxTeamsPerFormat);

            const btn = document.createElement('button');
            btn.className = `btn-team ${isOverLimit ? 'overlimit' : (isFull ? 'registered' : '')}`;
            let counterHTML = isNoLimit ? (count > 0 ? `${count}` : "No Limit") : `${count}/${maxTeamsPerFormat}`;

            btn.innerHTML = `
                <div style="text-align: left;">
                    <div style="font-family: 'Josefin Sans'; font-size: 1.2rem; font-weight: 700;">${format.toUpperCase()}</div>
                </div>
                <div style="font-size: 2.5rem; font-weight: 900; align-self: flex-end; line-height: 1;">${counterHTML}</div>
            `;
            btn.onclick = () => openTeamPicker(format, nomeUtenteClean);
            btnContainer.appendChild(btn);
        });
    }

    // --- 3. SIDEBAR PARTECIPANTI (CORRETTA CON DOPPIO CONTROLLO) ---
    const partCardTitle = document.querySelector('.participants-card h3');
    if (partCardTitle) {
        partCardTitle.innerText = `PLAYERS: ${countIscritti}/${limitIscritti}`;
    }

    const partList = document.getElementById('participants-list');
    if (!partList) return;
    
    partList.innerHTML = ''; // Svuota la lista

    if (data.iscritti) {
        const playerNames = Object.keys(data.iscritti);
        
        for (const player of playerNames) {
            // PRIMO CONTROLLO: Prima di andare a chiedere i colori
            if (myRenderID !== currentRenderID) return;

            const colors = await getPlayersColors(player, player);

            if (myRenderID !== currentRenderID) return;

            const tag = document.createElement('div');

            tag.style.cssText = `
                font-size: 0.8rem;

                font-weight: 600;

async function openTeamPicker(format, nomeUtenteClean) {
    // 1. Recupera il limite reale dalla stagione
    const seasonSnap = await db.ref(`seasons/${seasonId}/info`).once('value');
    const seasonInfo = seasonSnap.val() || {};
    
    // Gestione No Limit vs Numero
    const rawLimit = seasonInfo.teams_per_format;
    const isNoLimit = (rawLimit === "No Limit" || rawLimit === 0 || rawLimit === "0");
    const maxAllowed = isNoLimit ? Number.MAX_SAFE_INTEGER : (parseInt(rawLimit) || 1);

    // 2. Carica selezione esistente
    const currentSnap = await db.ref(`seasons/${seasonId}/teams_iscritti/${format}/${nomeUtenteClean}`).once('value');
    selectedTeamIds = currentSnap.val()?.teamIds || [];

    // 3. Carica team del player
    const teamsSnap = await db.ref(`players/${nomeUtenteClean}/teams`).once('value');
    const allTeams = teamsSnap.val() || {};
    
    const container = document.getElementById('user-teams-list');
    container.innerHTML = '';
    
    const title = document.getElementById('modal-format-title');
    
    let confirmBtn = document.getElementById('btn-confirm-selection');
    if (!confirmBtn) {
        confirmBtn = document.createElement('button');
        confirmBtn.id = 'btn-confirm-selection';
        confirmBtn.className = 'btn-confirm';
        container.after(confirmBtn);
    }

    const updateTitleAndUI = () => {
        const isOverLimit = !isNoLimit && selectedTeamIds.length > maxAllowed;
        const counterText = isNoLimit ? `${selectedTeamIds.length}` : `${selectedTeamIds.length}/${maxAllowed}`;
        const titleColor = isOverLimit ? "#ff4b4b" : "#eeeeee";
        title.innerHTML = `<span style="color:${titleColor}; font-family: 'Josefin Sans', sans-serif;">Select ${format} Teams (${counterText})</span>`;
        
        if (isOverLimit) {
            confirmBtn.innerText = "Too many teams!";
            confirmBtn.disabled = true;
            confirmBtn.style.opacity = "0.5";
            confirmBtn.style.cursor = "not-allowed";
        } else {
            confirmBtn.innerText = "Save selection";
            confirmBtn.disabled = false;
            confirmBtn.style.opacity = "1";
            confirmBtn.style.cursor = "pointer";
        }
    };

    updateTitleAndUI();

    Object.entries(allTeams).forEach(([id, data]) => {
        if (data.categoria === format) {
            const div = document.createElement('div');
            div.className = `team-option ${selectedTeamIds.includes(id) ? 'selected' : ''}`;
            
            const pokemonArray = Array.isArray(data.pokemon) ? data.pokemon : Object.values(data.pokemon || {});
            const pokemonImages = pokemonArray.map(p => {
                const pkmnName = p && typeof p === 'object' ? p.nome : p;
                if (!pkmnName || typeof pkmnName !== 'string') return '';
                const spriteName = pkmnName.toLowerCase().trim().replace(/\s+/g, '-');
                return `<img src="https://play.pokemonshowdown.com/sprites/ani/${spriteName}.gif" 
                             onerror="this.src='https://play.pokemonshowdown.com/sprites/dex/${spriteName}.png'"
                             class="preview-pkmn-img" title="${pkmnName}">`;
            }).join('');

            div.innerHTML = `
                <div class="team-info-wrapper">
                    <strong>${data.nome}</strong>
                    <div class="info-preview-container">
                        <div class="info-icon">i</div>
                        <div class="team-preview-tooltip">
                            ${pokemonImages || '<span style="color:white;font-size:12px">No Pokémon Data</span>'}
                        </div>
                    </div>
                </div>
            `;
            
            // --- GESTIONE CLICK ICONA INFO ---
            const icon = div.querySelector('.info-icon');
            icon.onclick = (e) => {
                e.stopPropagation(); // Fondamentale per non selezionare il team al click sulla 'i'
                // Chiamata alla funzione di dettaglio esistente
                apriDettaglioTeam(nomeUtenteClean, data.nome, format);
            };

            // --- GESTIONE SELEZIONE TEAM ---
            div.onclick = (e) => {
                // Se clicchi l'icona non fare nulla (già gestito sopra)
                if (e.target.classList.contains('info-icon')) return;

                const index = selectedTeamIds.indexOf(id);
                if (index > -1) {
                    selectedTeamIds.splice(index, 1);
                    div.classList.remove('selected');
                } else if (selectedTeamIds.length < maxAllowed) {
                    selectedTeamIds.push(id);
                    div.classList.add('selected');
                } else {
                    alert(`Max ${maxAllowed} teams allowed for this format!`);
                }
                updateTitleAndUI();
            };
            container.appendChild(div);
        }
    });
    
    confirmBtn.onclick = () => inviaSelezioneTeam(format, nomeUtenteClean, allTeams);
    document.getElementById('modal-select-team').style.display = 'block';
}

async function apriDettaglioTeam(idPlayerPuro, nomeTeam, formato) {
    const modal = document.getElementById('teamModal');
    const content = document.getElementById('teamDetailContent');
    
    modal.classList.remove('proprietario-Didi', 'proprietario-Lu');
    if(idPlayerPuro.toLowerCase().includes('didi')) modal.classList.add('proprietario-Didi');
    else if(idPlayerPuro.toLowerCase().includes('lu')) modal.classList.add('proprietario-Lu');

    content.innerHTML = '<div style="color:white; text-align:center; padding:20px;">Loading team data...</div>';
    modal.style.display = 'flex';

    try {
        let teamData = null;
        let proprietarioEffettivo = idPlayerPuro;

        // --- 1. TENTATIVO: Archivio Stagionale (window.teamsIscrittiStagione) ---
        const fData = window.teamsIscrittiStagione ? window.teamsIscrittiStagione[formato] : null;
        if (fData) {
            for (const playerKey in fData) {
                const playerNode = fData[playerKey];
                if (playerNode && playerNode.datiTeams) {
                    const trovato = playerNode.datiTeams.find(t => {
                        const n = (typeof t.nome === 'object') ? t.nome.valore : t.nome;
                        return n === nomeTeam;
                    });
                    if (trovato) {
                        teamData = trovato;
                        proprietarioEffettivo = playerKey;
                        break;
                    }
                }
            }
        }

        // --- 2. TENTATIVO: Fallback sul Box Player (per il Team Picker) ---
        if (!teamData) {
            const playerBoxSnap = await db.ref(`players/${idPlayerPuro}/teams`).once('value');
            const playerTeams = playerBoxSnap.val() || {};
            // Cerchiamo il team per nome tra quelli del player loggato
            teamData = Object.values(playerTeams).find(t => t.nome === nomeTeam);
        }

        if (teamData) {
            // Statistiche: se siamo nel picker saranno probabilmente 0, 
            // ma proviamo a recuperarle se presenti nel database globale
            const statsCalcolate = (window.databaseDidi && window.databaseDidi[nomeTeam]) || {};

            let team = {
                nome: (typeof teamData.nome === 'object') ? teamData.nome.valore : teamData.nome,
                vittorie: teamData.vittorie || statsCalcolate.vittorie || 0,
                sconfitte: teamData.sconfitte || statsCalcolate.sconfitte || 0,
                setVinti: teamData.setW || statsCalcolate.setVinti || 0, // Notare setW vs setVinti
                setPersi: teamData.setL || statsCalcolate.setPersi || 0,
                puntiFatti: teamData.punti || statsCalcolate.puntiFatti || 0,
                pokemon: []
            };

            const listaSorgente = teamData.pokemon || [];
            
            team.pokemon = Object.values(listaSorgente).map(p => ({
                nome: p.nome || "???",
                abilita: p.abilita || "N/D",
                strumento: p.strumento || "Nessuno",
                mosse: (p.mosse) ? Object.values(p.mosse) : ["-", "-", "-", "-"],
                evs: p.evs || "N/D"
            }));

            content.innerHTML = generaHtmlDettaglioTeam(team, proprietarioEffettivo);
        } else {
            content.innerHTML = `<div style="color:white; text-align:center;">Team "${nomeTeam}" non trovato.</div>`;
        }
    } catch (e) {
        console.error("Errore dettaglio:", e);
        content.innerHTML = `<div style="color:white; text-align:center;">Errore di caricamento.</div>`;
    }
}

async function caricaInfoAbilita(nomeAbilita, elementoId) {
    const tooltip = document.getElementById(elementoId);
    if (!nomeAbilita || tooltip.dataset.loaded === "true") return;

    try {
        const cleanName = nomeAbilita.toLowerCase().trim().replace(/\s+/g, '-').replace(/[.'é]/g, '');
        const res = await fetch(`https://pokeapi.co/api/v2/ability/${cleanName}`);                 
        const data = await res.json();
        const effect = data.effect_entries.find(e => e.language.name === 'en')?.short_effect || "Descrizione non disponibile.";
        
        tooltip.innerHTML = `<p>${effect}</p>`;
        tooltip.dataset.loaded = "true";
    } catch (e) { tooltip.innerHTML = `</h3><p>Info non trovate.</p>`; }
}

async function caricaInfoMossa(nomeMossa, elementoId) {
    const tooltip = document.getElementById(elementoId);
    
    // Se la mossa è vuota o già caricata, non fare nulla
    if (!nomeMossa || nomeMossa.trim() === "-" || tooltip.dataset.loaded === "true") return;

    try {
        const cleanName = nomeMossa.trim().toLowerCase().replace(/\s+/g, '-').replace(/[.'é]/g, '');
        const res = await fetch(`https://pokeapi.co/api/v2/move/${cleanName}`);
        
        if (!res.ok) throw new Error();
        const data = await res.json();
        
        // --- APPLICHIAMO IL COLORE AL TOOLTIP ---
        const tipo = data.type.name; 
        tooltip.className = `move-tooltip ${tipo}`; // Aggiunge la classe del tipo (es. "fire") al fumetto
        // ----------------------------------------

        const power = data.power || '--';
        const accuracy = data.accuracy ? data.accuracy + '%' : '--';
        let effect = data.effect_entries.find(e => e.language.name === 'en')?.short_effect || "Descrizione non disponibile.";
        if (data.effect_chance) effect = effect.replace('$effect_chance', data.effect_chance);

        tooltip.innerHTML = `
            <div style="font-weight:bold; margin-bottom:4px; border-bottom:1px solid rgba(255,255,255,0.4);">
                ${nomeMossa.toUpperCase()}
            </div>
            <b>POW:</b> ${power} &nbsp;&nbsp; <b>ACC:</b> ${accuracy}<br>
            <div style="margin-top:6px; font-style:italic; font-size:0.7rem; line-height:1.2;">${effect}</div>
        `;
        
        tooltip.dataset.loaded = "true";
    } catch (e) {
        tooltip.innerText = "Dati mossa non trovati.";
        tooltip.style.background = "#33261c"; // Colore di fallback in caso di errore
    }
}
async function caricaStats(pkmName, elementId) {
    const tooltip = document.getElementById(elementId);
    if (tooltip.dataset.loaded === "true") return;

    try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${pkmName}`);
        const data = await res.json();
        
        const statsMap = {
            'hp': 'HP',
            'attack': 'ATK',
            'defense': 'DEF',
            'special-attack': 'SPA',
            'special-defense': 'SPD',
            'speed': 'SPE'
        };

        let statsHTML = `<div style="font-weight:bold; margin-bottom:8px; border-bottom:1px solid #eeeeee; font-size:0.8rem">BASE STATS</div>`;
        
        data.stats.forEach(s => {
            const val = s.base_stat;
            // Calcoliamo la larghezza della barra (max 150 per le stats base medie)
            const width = Math.min((val / 150) * 100, 100); 
            statsHTML += `
                <div class="stat-row">
                    <span style="width: 30px; font-weight:bold;">${statsMap[s.stat.name]}</span>
                    <span style="width: 25px; text-align:right;">${val}</span>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width: ${width}%"></div>
                    </div>
                </div>`;
        });

        tooltip.innerHTML = statsHTML;
        tooltip.dataset.loaded = "true";
    } catch (e) {
        tooltip.innerText = "Not able to load stats.";
    }
}

// Nuova funzione per scaricare i tipi
// Aggiunto "direzione" ai parametri
async function caricaTipi(pkmName, elementId, direzione) {
    try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${pkmName}`);
        const data = await res.json();
        const container = document.getElementById(elementId);
        if (!container) return;

        const d_types = ["normal","fire","water","electric","grass","ice","fighting","poison","ground","flying","psychic","bug","rock","ghost","dragon","dark","steel","fairy"];
        let effectiveness = {};
        d_types.forEach(type => effectiveness[type] = 1);

        await Promise.all(data.types.map(async (t) => {
            const typeRes = await fetch(t.type.url);
            const typeData = await typeRes.json();
            const rel = typeData.damage_relations;

            rel.double_damage_from.forEach(type => effectiveness[type.name] *= 2);
            rel.half_damage_from.forEach(type => effectiveness[type.name] *= 0.5);
            rel.no_damage_from.forEach(type => effectiveness[type.name] *= 0);
        }));

        let result = { x4: [], x2: [], x05: [], x025: [], x0: [] };
        for (let type in effectiveness) {
            const mult = effectiveness[type];
            if (mult === 4) result.x4.push(type);
            else if (mult === 2) result.x2.push(type);
            else if (mult === 0.5) result.x05.push(type);
            else if (mult === 0.25) result.x025.push(type);
            else if (mult === 0) result.x0.push(type);
        }

        const creaBadge = (lista) => {
            return `<div class="eff-badge-container">
                ${lista.map(t => `<span class="mini-type-badge ${t}">${t}</span>`).join('')}
            </div>`;
        };

        let tooltipHTML = "";
        if (result.x4.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-4">4x</span>${creaBadge(result.x4)}</div>`;
        if (result.x2.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-2">2x</span>${creaBadge(result.x2)}</div>`;
        if (result.x05.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-05">0.5x</span>${creaBadge(result.x05)}</div>`;
        if (result.x025.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-025">0.25x</span>${creaBadge(result.x025)}</div>`;
        if (result.x0.length > 0) tooltipHTML += `<div class="eff-section"><span class="eff-title v-0">0x</span>${creaBadge(result.x0)}</div>`;

        // --- APPLICAZIONE CLASSE DIREZIONE ---
        container.innerHTML = data.types.map(t => 
        `<div class="type-container">
            <span class="type-badge ${t.type.name}">${t.type.name.toUpperCase()}</span>
            <div class="type-effectiveness-tooltip ${direzione}">${tooltipHTML}</div>
        </div>`
    ).join('');

    } catch (e) { console.error("Error:", e); }
}

async function inviaSelezioneTeam(format, nomeUtenteClean, allTeams) {
    if (selectedTeamIds.length === 0) {

    }

    const payload = {
        teamIds: selectedTeamIds,
        datiTeams: selectedTeamIds.map(id => ({
            id: id,
            nome: allTeams[id].nome,
            pokemon: allTeams[id].pokemon || []
        })),
        count: selectedTeamIds.length,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    };

    try {
        await db.ref(`seasons/${seasonId}/teams_iscritti/${format}/${nomeUtenteClean}`).set(payload);
        closeTeamModal();
    } catch (e) {
        console.error("Errore salvataggio:", e);
    }
}

            const nomePlayer = userSnap.val()?.name;

function toggleLoginModal() {
    const modal = document.getElementById('login-modal');
    modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
}

// Gestione Login
document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');

    // Firebase Auth Login
    auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            console.log("Login effettuato:", userCredential.user);
            toggleLoginModal();
            // Il refresh non è obbligatorio ma aiuta a resettare lo stato della UI
            location.reload(); 
        })
        .catch((error) => {
            errorEl.innerText = "Email o Password errati.";
            console.error(error);
        });
});

// Controllo Stato Autenticazione (Eseguito automaticamente al caricamento di ogni pagina)
auth.onAuthStateChanged((user) => {
    const btnOpen = document.getElementById('btn-open-login');
    const btnLogout = document.getElementById('btn-logout');
    const userDisplay = document.getElementById('user-display-name');

    if (user) {
        // Utente Loggato
        if(btnOpen) btnOpen.style.display = 'none';
        if(btnLogout) btnLogout.style.display = 'block';
        if(userDisplay) {
            userDisplay.style.display = 'inline';
            userDisplay.innerText = user.email; // Mostra l'email dell'utente
        }
    } else {
        // Utente non loggato
        if(btnOpen) btnOpen.style.display = 'block';
        if(btnLogout) btnLogout.style.display = 'none';
        if(userDisplay) userDisplay.style.display = 'none';
    }
});

function handleAuthClick() {
    const user = auth.currentUser;
    if (!user) {
        toggleLoginModal();
    } else {
        const menu = document.getElementById('user-menu');
        menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    }
}

// UNICO listener per lo stato autenticazione
auth.onAuthStateChanged(async (user) => {
    const authIcon = document.getElementById('auth-icon');
    const authText = document.getElementById('auth-text');
    if (!authIcon || !authText) return;

    if (user) {
        try {
            const snapshot = await db.ref(`users/${user.uid}/name`).once('value');
            const userName = snapshot.val() || "User";
            authIcon.className = "fas fa-user-circle"; 
            authText.innerText = userName;
        } catch (error) {
            authText.innerText = "Logged In";
        }
    } else {
        authIcon.className = "fas fa-lock";
        authText.innerText = "";
    }
});

// Gestione Form Login

    const email = document.getElementById('login-email').value;

    auth.signInWithEmailAndPassword(email, password)
