let badgeSelezionati = []; // Array globale che contiene gli ID dei badge scelti

function toggleBadge(badgeId, element) {
    const index = badgeSelezionati.indexOf(badgeId);

    if (index > -1) {
        // Se è già selezionato, lo rimuoviamo (togliamo il tick)
        badgeSelezionati.splice(index, 1);
        element.classList.remove('selected');
    } else {
        // Se non è selezionato, lo aggiungiamo (limite massimo 3 per estetica)
        if (badgeSelezionati.length >= 3) {
            alert("Puoi mostrare al massimo 3 badge!");
            return;
        }
        badgeSelezionati.push(badgeId);
        element.classList.add('selected');
    }

    // AGGIORNAMENTO ISTANTANEO DELLO SHOWCASE
    aggiornaTrophyShowcase();
}

function aggiornaTrophyShowcase() {
    const container = document.getElementById('showcase-container');
    if (!container) return;

    // Se non ci sono badge, rimettiamo il placeholder
    if (badgeSelezionati.length === 0) {
        container.innerHTML = '<div class="badges-placeholder">Selected badges will appear here</div>';
        return;
    }

    // Se ci sono badge, svuotiamo e iniettiamo le immagini
    container.innerHTML = ""; 
    badgeSelezionati.forEach(id => {
        const img = document.createElement('img');
        img.src = `immagini/badges/${id}.png`; // Assicurati che il percorso sia corretto
        img.className = "showcase-badge-img";
        img.title = id;
        container.appendChild(img);
    });
}

// --- 4. CARICAMENTO DATI DA FIREBASE ---
async function caricaDatiProfilo() {
    try {
        if (!playerID) return;

        // Inizializza i componenti grafici (palette colori, selettore avatar base)
        inizializzaAppearance();

        const [snapMatches, snapPlayer] = await Promise.all([
            db.ref('matches').once('value'),
            db.ref(`players/${playerID}`).once('value')
        ]);

        const playerData = snapPlayer.val() || {};
        const teamsRaw = playerData.teams || {};
        const info = playerData.info || {}; 

        // A. SINCRONIZZAZIONE APPEARANCE & STYLE NEUBRUTALIST
        if (info.avatar) {
            const avatarPreview = document.getElementById('current-avatar-preview');
            if (avatarPreview) avatarPreview.src = info.avatar;
        }

        if (info.color) {
            const colorePlayer = info.color;

            // 1. Aggiorna lo sfondo della fascia Hero col colore del giocatore
            const heroSection = document.querySelector('.hub-hero');
            if (heroSection) {
                heroSection.style.backgroundColor = colorePlayer;
            }

            // 2. TITOLO: Box sempre NERO, Testo sempre BIANCO
            const titoloDisplay = document.querySelector('.hub-title-display');
            if (titoloDisplay) {
                titoloDisplay.style.backgroundColor = "#000"; 
                titoloDisplay.style.color = "#fff"; // <--- BIANCO FISSO
                titoloDisplay.style.borderColor = "#000";
            }

            // 3. Aggiorna anche il quadratino nelle impostazioni (per feedback)
            const colorBg = document.getElementById('current-color-bg');
            if (colorBg) colorBg.style.backgroundColor = colorePlayer;
        }

        // B. BADGE E TROPHY SHOWCASE
        // Ripristiniamo l'array globale dei badge selezionati dal database
        if (info.badgeShowcase) {
            window.badgeSelezionati = info.badgeShowcase;
            // Disegna immediatamente i badge nel box tratteggiato superiore
            if (typeof aggiornaTrophyShowcase === "function") {
                aggiornaTrophyShowcase();
            }
        } else {
            window.badgeSelezionati = [];
        }

        // C. SINCRONIZZAZIONE BIO
        if (document.getElementById('bio-input')) {
            document.getElementById('bio-input').value = info.bio || "";
        }
        
        // D. MUSICA
        const audio = document.getElementById('bg-music');
        const songNameDisplay = document.getElementById('selected-song-name');
        const songUrlInput = document.getElementById('selected-music-url');
        
        if (info.musicaPreferita) {
            if (audio && audio.src !== info.musicaPreferita) audio.src = info.musicaPreferita;
            if (songUrlInput) songUrlInput.value = info.musicaPreferita;
            if (songNameDisplay) songNameDisplay.innerText = info.musicName || "Musica Salvata";
        }

        // E. ELABORAZIONE TEAM
        const teams = Object.keys(teamsRaw).map(key => {
            const t = teamsRaw[key];
            const s = t.stats || {};
            return {
                id: key, ...t,
                win: s.won || 0, loss: s.lost || 0,
                sW: s.setW || 0, sL: s.setL || 0,
                pts: s.punti || 0
            };
        });

        window.tuttiITeam = teams;
        window.idTeamPreferito = info.idTeamPreferito || "auto";
        
        popolaSelettoreTeam();
        const teamSelect = document.getElementById('team-selector-fav');
        if (teamSelect) teamSelect.value = window.idTeamPreferito;

        // F. AGGIORNAMENTO UI STATS & BADGE DISPONIBILI
        // Fondamentale: elaboraBadge() userà window.badgeSelezionati per mettere i TICK VERDI
        if (typeof elaboraBadge === "function") {
            await elaboraBadge(); 
        }

        if (typeof aggiornaUIProfilo === "function") {
            let genStats = { win: 0, loss: 0, sW: 0, sL: 0, pts: 0 };
            teams.forEach(t => {
                genStats.win += t.win; genStats.loss += t.loss;
                genStats.sW += t.sW; genStats.sL += t.sL;
                genStats.pts += t.pts;
            });
            const categoryCounts = {};
            teams.forEach(t => { if(t.categoria) categoryCounts[t.categoria] = (categoryCounts[t.categoria] || 0) + t.win; });
            const bestCat = Object.keys(categoryCounts).sort((a,b) => categoryCounts[b] - categoryCounts[a])[0] || "N/A";
            
            aggiornaUIProfilo(genStats, teams.sort((a, b) => b.pts - a.pts)[0], bestCat);
        }

        console.log("✅ Profilo Neubrutalist ricaricato correttamente.");

    } catch (e) {
        console.error("❌ Errore nel caricamento profilo:", e);
    }
}

// --- 6. AGGIORNAMENTO UI PROFILO ---
function aggiornaUIProfilo(gen, best, bestCat) {
    const setTxt = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; };

    setTxt('global-win', gen.win);
    setTxt('global-loss', gen.loss);
    setTxt('global-setv', gen.sW);
    setTxt('global-setp', gen.sL);
    setTxt('global-punti', gen.pts);
    setTxt('global-pct-win', getPct(gen.win, gen.loss));
    setTxt('global-pct-set', getPct(gen.sW, gen.sL));
    setTxt('best-category-name', bestCat);

    if (best) {
        setTxt('best-team-name-new', best.nome || "Senza Nome");
        setTxt('team-win', best.win);
        setTxt('team-loss', best.loss);
        setTxt('team-setv', best.sW);
        setTxt('team-setp', best.sL);
        setTxt('team-punti', best.pts);
        setTxt('team-pct-win', getPct(best.win, best.loss));
    }
}

// Funzione di supporto per il conteggio caratteri
function attivaContatoreBio() {
    const bioInput = document.getElementById('bio-input');
    // Creiamo il contatore se non esiste già nell'HTML
    let bioCounter = document.getElementById('bio-counter');
    
    if (bioInput) {
        // Se il contatore non c'è nell'HTML, lo aggiungiamo dinamicamente sotto la textarea
        if (!bioCounter) {
            bioCounter = document.createElement('div');
            bioCounter.id = 'bio-counter';
            bioCounter.style = "font-size: 0.75em; text-align: right; opacity: 0.7; margin-top: 5px; font-weight: 800;";
            bioInput.parentNode.appendChild(bioCounter);
        }

        // Funzione per aggiornare il numero
        const updateCount = () => {
            const length = bioInput.value.length;
            bioCounter.textContent = `${length} / 150`;
            bioCounter.style.color = length >= 150 ? "#f05252" : "inherit";
        };

        // Ascolta la digitazione
        bioInput.addEventListener('input', updateCount);
        
        // Eseguiamo un primo aggiornamento (nel caso ci sia già testo caricato dal DB)
        updateCount();
    }
}

    const clean = (cell) => cell ? cell.replace(/^"(.*)"$/, '$1').trim() : "";

    const formatPct = (val) => {
        if (!val || val === "" || val.toLowerCase().includes("nan")) return "0%";
        let cleanVal = val.replace(/[^\d.,]/g, '').trim().replace(',', '.');
        let num = parseFloat(cleanVal);
        if (isNaN(num)) return "0%";
        if (num > 0 && num <= 1) num = num * 100;
        return Math.round(num) + "%";
    };

            const nomePulito = nome.trim().replace(/\n/g, " ").toUpperCase();
            // Associa il valore pulito, se la riga è più corta mette stringa vuota
            mappa[nomePulito] = riga[indice] ? riga[indice].trim() : "";
        }
    });
    return mappa;
}

function getPct(v, l) {
    const tot = Number(v) + Number(l);
    // Usiamo Math.round per arrotondare all'intero più vicino
    return tot > 0 ? Math.round((v / tot) * 100) + "%" : "0%";
}

function mostraBadge(vinteObj, cleanObj) {
    // 1. Reset e setup iniziale
    // badgeGuadagnati deve essere globale o dichiarata fuori per essere usata da aggiornaTrophyShowcase
    badgeGuadagnati = []; 
    const grid = document.getElementById('badge-selection-grid');
    if (!grid) return;
    grid.innerHTML = "";

    // 2. Identificazione Badge Fondatore (Paldea)
    const chiSono = document.title.toLowerCase();
    const isFondatore = chiSono.includes("didi") || chiSono.includes("lu");
    
    if (isFondatore) {
        badgeGuadagnati.push({ 
            id: 'paldea', 
            src: 'immagini/paldea.png', 
            title: 'League Founder' 
        });
    }

    // 3. Definizione Soglie per Record Strike e Clean Strike
    const categorie = [
        {
            valore: vinteObj.max,
            soglie: [
                {n: 15, e: "immagini/sinnoh-gold.png", t:"Legend: 15+ wins strike"},
                {n: 10, e: "immagini/sinnoh-silver.png", t:"Veteran: 10 wins strike"},
                {n: 5, e: "immagini/sinnoh-bronze.png", t:"Talent: 5 wins strike"}
            ]
        },
        {
            valore: cleanObj.max,
            soglie: [
                {n: 10, e: "immagini/champion-gold.png", t:"Untouchable: 10+ clean strike"},
                {n: 6, e: "immagini/champion-silver.png", t:"Wall: 6 clean strike"},
                {n: 3, e: "immagini/champion-bronze.png", t:"Shield: 3 clean strike"}
            ]
        }
    ];

    // 4. Raccolta badge sbloccati (solo il più alto per categoria)
    categorie.forEach(cat => {
        const raggiunto = cat.soglie.find(s => cat.valore >= s.n);
        if (raggiunto) {
            const idBadge = raggiunto.e.split('/').pop().replace('.png', '');
            badgeGuadagnati.push({ id: idBadge, src: raggiunto.e, title: raggiunto.t });
        }
    });

    // 5. Generazione Dinamica della Griglia di Selezione
    badgeGuadagnati.forEach(badge => {
        const div = document.createElement('div');
        div.className = "badge-item-selector";
        
        // CONTROLLO ATTIVO: Se l'ID è presente tra quelli salvati (badgeSelezionati), 
        // aggiungiamo subito la classe 'selected' per mostrare il tick verde.
        if (window.badgeSelezionati && window.badgeSelezionati.includes(badge.id)) {
            div.classList.add('selected');
        }

        div.innerHTML = `<img src="${badge.src}" title="${badge.title}" alt="${badge.id}">`;
        
        // Al click gestiamo la selezione/deselezione
        div.onclick = function() {
            toggleBadge(badge.id, div);
        };
        
        grid.appendChild(div);
    });

    // 6. Sincronizzazione finale con il Trophy Showcase superiore
    // (Così i badge scelti appaiono subito nel riquadro tratteggiato)
    aggiornaTrophyShowcase();
}

function calcolaProgressioneBadge(currentVal, maxRecord, listaBadge) {
    const soglie = [...listaBadge].sort((a, b) => a.n - b.n);
    
    const badgeAttuale = [...listaBadge].find(b => maxRecord >= b.n) || listaBadge[listaBadge.length - 1];
    
    const prossimoBadge = soglie.find(b => b.n > maxRecord);
    const obiettivo = prossimoBadge ? prossimoBadge.n : soglie[soglie.length - 1].n;
    
    let percentuale = (currentVal / obiettivo) * 100;
    if (percentuale > 100) percentuale = 100;

    return {
        img: badgeAttuale.e,
        obiettivo: obiettivo,
        percentuale: percentuale
    };
}

    }

    // 5. Update su Firebase nel percorso players/ID/info

    .catch(e => {

        alert("Errore: " + e.message);

            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    });

// Funzione indispensabile per trasformare il colore del quadratino in stringa HEX per il DB
function rgbToHex(rgb) {
    if (!rgb) return "#31C489";
    if (rgb.startsWith('#')) return rgb;
    const rgbValues = rgb.match(/\d+/g);
    if (!rgbValues || rgbValues.length < 3) return "#31C489";
    const r = parseInt(rgbValues[0]);
    const g = parseInt(rgbValues[1]);
    const b = parseInt(rgbValues[2]);
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
}

// Funzione per gestire l'anteprima
function riproduciAnteprima(event, url) {
    event.stopPropagation(); // Evita di selezionare la canzone se clicchi solo il tasto play

    if (anteprimaAudio) {
        anteprimaAudio.pause();
        if (anteprimaAudio.src === url) {
            anteprimaAudio = null;
            return;
        }
    }

    anteprimaAudio = new Audio(url);
    anteprimaAudio.volume = 0.4;
    anteprimaAudio.play();
}

        document.getElementById('music-search').value = "";
        filtraMusica(); 
    }
}

// Quando scegli una canzone: aggiorna il nome, chiude il menu e ferma l'anteprima
function selezionaCanzone(elementoSpan, url) {
    // 1. Ferma l'anteprima immediatamente (se esiste)
    if (typeof anteprimaAudio !== 'undefined' && anteprimaAudio) {
        anteprimaAudio.pause();
        anteprimaAudio.currentTime = 0; // Resetta la traccia
        anteprimaAudio = null;
    }

    // 2. Recupera il nome in modo sicuro
    const nomeCanzone = elementoSpan.innerText.trim();
    
    // 3. Aggiorna l'interfaccia (Header e Input Nascosto)
    const labelHeader = document.getElementById('selected-song-name');
    const inputNascosto = document.getElementById('selected-music-url');
    
    if (labelHeader) labelHeader.innerText = nomeCanzone;
    if (inputNascosto) inputNascosto.value = url;

    // 4. Gestione classi visive (rimuovi 'selected' da tutti e mettilo al nuovo)
    document.querySelectorAll('.music-item').forEach(item => {
        item.classList.remove('selected');
    });
    
    // Usiamo closest per essere sicuri di colpire il contenitore <li>
    const rigaSelezionata = elementoSpan.closest('.music-item');
    if (rigaSelezionata) {
        rigaSelezionata.classList.add('selected');
    }

    // 5. Chiudi il menu (Rimuoviamo la classe 'show' invece di fare il toggle)
    const content = document.getElementById('dropdown-content');
    if (content) {
        content.classList.remove('show');
    }

    // 6. Log di verifica in console
    console.log("Canzone selezionata con successo:", nomeCanzone);
}

const URL_PLAYLIST = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRBD7fZsWUtQ-UqcSaG-2lzeQnbxUdCUlTc8D6b4dCmSLq4-sDpIJGVzKmwwZF0p1uF-Ln3--4jpGk/pub?gid=775181727&single=true&output=csv";

// 2. Funzione per leggere il CSV della musica e popolare il menu
async function popolaSelettoreMusica() {
    const listaUI = document.getElementById('music-list-admin');
    if (!listaUI) return;

    try {
        const response = await fetch(URL_PLAYLIST + '&t=' + Date.now());
        const csvText = await response.text();
        const righe = csvText.split(/\r?\n/).map(r => r.split(','));

        listaUI.innerHTML = ""; // Puliamo la lista

        righe.forEach((colonne, index) => {
            // Saltiamo l'intestazione
            if (index === 0) return; 

            if (colonne[0] && colonne[1]) {
                const nomeCanzone = colonne[0].trim();
                const urlCanzone = colonne[1].trim();
                
                const li = document.createElement('li');
                li.className = "music-item";
                // Se è quella già salvata, aggiungiamo la classe selected
                if (window.musicaCorrente === urlCanzone) {
                    li.classList.add('selected');
                    // Inizializziamo il campo nascosto con la musica attuale
                    document.getElementById('selected-music-url').value = urlCanzone;
                }

                li.dataset.url = urlCanzone;
                li.dataset.nome = nomeCanzone.toLowerCase();

                li.innerHTML = `
                    <span class="music-name" onclick="selezionaCanzone(this, '${urlCanzone}')">${nomeCanzone}</span>
                    <button class="preview-btn" onclick="riproduciAnteprima(event, '${urlCanzone}')">▶</button>
                `;
                listaUI.appendChild(li);
            }
        });
    } catch (e) {
        console.error("Errore playlist:", e);
        listaUI.innerHTML = '<li style="padding:10px; color:red;">Errore nel caricamento</li>';
    }
}

function ascoltaCambiamentiFirebase() {
    db.ref('allenatore_lukiani').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.musicaPreferita) {
            const player = document.getElementById('bg-music');
            const icon = document.getElementById('music-icon');
            const titleDisplay = document.getElementById('song-title'); // Il nuovo elemento per il testo

            if (player.src !== data.musicaPreferita) {
                player.src = data.musicaPreferita;
                player.volume = 0.3;
                
                // --- LOGICA PER IL NOME DELLA CANZONE ---
                // 1. Prende l'ultima parte del link (dopo lo slash)
                let nomeFile = data.musicaPreferita.split('/').pop(); 
                // 2. Toglie l'estensione .mp3 e pulisce i simboli strani come %20
                let nomePulito = decodeURIComponent(nomeFile).replace('.mp3', '');
                // 3. Toglie eventuali numeri iniziali (es: "13 - ")
                nomePulito = nomePulito.replace(/^\d+\s*-\s*/, '');

                // Se abbiamo l'elemento HTML, scriviamo il nome e lo mostriamo
                if (titleDisplay) {
                    titleDisplay.innerText = "🎵 " + nomePulito;
                    titleDisplay.style.display = "block";
                }
                // ----------------------------------------

                player.play()
                    .then(() => { icon.innerText = "🔊"; })
                    .catch(() => { icon.innerText = "🔇"; });
            }
        }
    });
}

function formattaTitolo(url) {
    if (!url) return "";
    let nome = url.substring(url.lastIndexOf('/') + 1);
    nome = nome.replace('.mp3', '');
    nome = decodeURIComponent(nome);
    nome = nome.replace(/^\d+\s*-\s*/, '');
    return nome;
}
